<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#faf8f5">
<link rel="manifest" href="/jf/manifest.json">
<title>每周小结 · 减脂</title>
<link rel="stylesheet" href="shared.css">
<style>
/* ===== 每周小结页专属样式 ===== */
.card { padding: 14px 16px; margin: 0 10px 10px; }
.card-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 5px; }

/* Header */
.page-header { padding: 18px 20px 6px; }
.page-header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
.page-header .sub { font-size: 13px; color: var(--sub); margin-top: 3px; }

/* Weight stats card */
.weight-stat {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px;
  background: var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 10px;
}
.ws-item {
  background: var(--card); padding: 12px 8px; text-align: center;
}
.ws-item .val { font-size: 22px; font-weight: 800; display: block; line-height: 1.1; }
.ws-item .lbl { font-size: 11px; color: var(--sub); margin-top: 3px; font-weight: 600; }
.ws-item .val.down { color: var(--cardio); }
.ws-item .val.up { color: var(--danger); }
.ws-item .val.flat { color: var(--sub); }
.ws-item .val.neutral { color: var(--primary); }

/* Weight Log Input */
.weight-input-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
}
.weight-input-row input {
  flex: 1; padding: 10px 12px; font-size: 18px; font-weight: 700;
  background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); outline: none; text-align: center;
  font-family: var(--font);
}
.weight-input-row input:focus { border-color: var(--primary); }
.weight-input-row button {
  padding: 10px 18px; background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer;
}
.weight-input-row button:active { opacity: .85; }

/* Weight log history */
.weight-log-list { max-height: 140px; overflow-y: auto; }
.wl-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 13px;
}
.wl-item:last-child { border-bottom: none; }
.wl-item .wl-date { color: var(--sub); font-size: 12px; }
.wl-item .wl-kg { font-weight: 700; font-size: 15px; }
.wl-item .wl-diff { font-size: 12px; font-weight: 600; }
.wl-diff.down { color: var(--cardio); }
.wl-diff.up { color: var(--danger); }
.wl-del { color: var(--sub); background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 6px; }

/* Week chart bar */
.week-chart { display: flex; align-items: flex-end; gap: 4px; height: 48px; margin: 10px 0 4px; }
.wc-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.wc-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
.wc-bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--border); transition: .3s; min-height: 4px; }
.wc-bar.filled { background: var(--primary); }
.wc-label { font-size: 10px; color: var(--sub); letter-spacing: 0; }

/* Review form */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 6px; font-weight: 600; }
.qb { display: flex; gap: 6px; flex-wrap: wrap; }
.qb-btn {
  padding: 5px 13px; border-radius: 8px; font-size: 12px; cursor: pointer;
  background: var(--surface); border: 1px solid var(--border); color: var(--text); transition: .2s;
  font-family: var(--font); font-weight: 600;
}
.qb-btn:hover { border-color: var(--primary); }
.qb-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }

textarea {
  width: 100%; padding: 10px 12px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; font-family: var(--font); min-height: 60px; resize: vertical;
  color: var(--text); outline: none;
}
textarea:focus { border-color: var(--primary); }

.save-btn {
  width: 100%; padding: 12px; background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: var(--font); transition: .2s;
}
.save-btn:active { opacity: .85; }

.saved-msg { text-align: center; font-size: 12px; color: var(--cardio); margin-top: 8px; display: none; }
.saved-msg.show { display: block; }

/* Past reviews */
.past-item {
  padding: 10px 12px; background: var(--surface);
  border-radius: var(--radius-sm); margin-bottom: 8px;
  border: 1px solid var(--border);
}

/* 训练详情网格 */
.training-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
.tg-day { text-align: center; }
.tg-day-label { font-size: 10px; color: var(--sub); margin-bottom: 3px; }
.tg-day-dot {
  width: 22px; height: 22px; border-radius: 50%; margin: 0 auto 2px;
  display: flex; align-items: center; justify-content: center; font-size: 11px;
  background: var(--surface); border: 1px solid var(--border); color: var(--sub);
}
.tg-day-dot.pull { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: var(--pull); font-weight: 700; }
.tg-day-dot.push { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.3); color: var(--push); font-weight: 700; }
.tg-day-dot.leg { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: var(--leg); font-weight: 700; }
.tg-day-dot.cardio { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3); color: var(--cardio); font-weight: 700; }
.tg-day-dot.recovery { background: rgba(167,139,250,0.12); border-color: rgba(167,139,250,0.3); color: var(--recovery); font-weight: 700; }
.tg-day-dot.today { box-shadow: 0 0 0 2px var(--primary); }
.tg-day-mins { font-size: 9px; color: var(--sub); }
.past-week { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
.past-meta { color: var(--sub); font-size: 12px; line-height: 1.6; }
.past-notes { color: var(--text); margin-top: 4px; font-size: 12px; line-height: 1.5; }

/* Progress toward goal */
.goal-bar-wrap { background: var(--surface); border-radius: 6px; height: 10px; overflow: hidden; margin: 6px 0; }
.goal-bar { height: 100%; border-radius: 6px; background: var(--primary); transition: width .6s ease; }

/* 体重趋势折线图 */
.trend-chart-wrap {
  position: relative; width: 100%; height: 140px; margin: 6px 0 4px;
  background: var(--surface); border-radius: 10px; overflow: hidden;
}
.trend-svg { width: 100%; height: 100%; display: block; }
.trend-axis { display: flex; justify-content: space-between; font-size: 10px; color: var(--sub); margin-top: 3px; padding: 0 4px; }
.trend-empty {
  display: flex; align-items: center; justify-content: center;
  height: 140px; color: var(--sub); font-size: 13px; background: var(--surface); border-radius: 10px;
}
.trend-range-btns { display: flex; gap: 6px; margin-bottom: 8px; }
.trend-range-btn {
  padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border); background: #fff; color: var(--sub); cursor: pointer;
  font-family: var(--font); transition: .15s;
}
.trend-range-btn.active {
  background: var(--primary); border-color: var(--primary); color: #fff;
}
.trend-goal-label { font-size: 10px; color: var(--sub); margin-bottom: 4px; display: flex; justify-content: flex-end; gap: 12px; align-items: center; }
.trend-goal-label span { display: flex; align-items: center; gap: 3px; }
.legend-dot { width: 8px; height: 3px; border-radius: 2px; display: inline-block; }
</style>
</head>
<body>


<div class="page-header">
  <h1>📝 每周小结</h1>
  <div class="sub" id="dateStr"></div>
</div>

<!-- ===== 减脂进度 ===== -->
<div class="card">
  <div class="card-title"> 减脂进度</div>
  <div style="font-size:13px;color:var(--sub);margin-bottom:6px">起点 <b style="color:var(--text)">85kg</b> → 目标 <b style="color:var(--text)">63–70kg</b></div>
  <div class="goal-bar-wrap"><div class="goal-bar" id="goalBar" style="width:0%"></div></div>
  <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-top:3px">
    <span>85kg（起点）</span>
    <span id="progressTxt">加载中...</span>
    <span>63kg（目标）</span>
  </div>
</div>

<!-- ===== 本周体重记录 ===== -->
<div class="card">
  <div class="card-title"> 体重记录</div>

  <!-- 今日输入 -->
  <div class="weight-input-row">
    <input type="number" id="weightInput" placeholder="今日体重 kg" step="0.1" min="40" max="200">
    <button onclick="logWeight()">记录</button>
  </div>
  <div style="font-size:11px;color:var(--sub);margin-bottom:10px">每天早上空腹排尿后称 · 看周均值，不看单日波动</div>

  <!-- 本周统计 -->
  <div class="weight-stat" id="weekStat">
    <div class="ws-item"><span class="val neutral" id="wStart">--</span><span class="lbl">本周起点</span></div>
    <div class="ws-item"><span class="val neutral" id="wLatest">--</span><span class="lbl">最新体重</span></div>
    <div class="ws-item"><span class="val neutral" id="wDiff">--</span><span class="lbl">本周变化</span></div>
  </div>

  <!-- 7天条形图 -->
  <div class="week-chart" id="weekChart"></div>
  <div style="display:flex;gap:4px;">
    <div style="flex:1;text-align:center;font-size:10px;color:var(--sub)">一</div>
    <div style="flex:1;text-align:center;font-size:10px;color:var(--sub)">二</div>
    <div style="flex:1;text-align:center;font-size:10px;color:var(--sub)">三</div>
    <div style="flex:1;text-align:center;font-size:10px;color:var(--sub)">四</div>
    <div style="flex:1;text-align:center;font-size:10px;color:var(--sub)">五</div>
    <div style="flex:1;text-align:center;font-size:10px;color:var(--sub)">六</div>
    <div style="flex:1;text-align:center;font-size:10px;color:var(--sub)">日</div>
  </div>

  <!-- 长期体重趋势折线图 -->
  <div style="margin-top:16px;font-size:12px;color:var(--sub);font-weight:600;margin-bottom:6px">📈 长期趋势</div>
  <div class="trend-range-btns">
    <button class="trend-range-btn active" onclick="renderTrendChart(30)" id="trendBtn30">近30天</button>
    <button class="trend-range-btn" onclick="renderTrendChart(60)" id="trendBtn60">近60天</button>
    <button class="trend-range-btn" onclick="renderTrendChart(0)" id="trendBtnAll">全部</button>
  </div>
  <div class="trend-goal-label">
    <span><span class="legend-dot" style="background:var(--primary)"></span>实测体重</span>
    <span><span class="legend-dot" style="background:#ef4444;opacity:0.6"></span>目标线 63kg</span>
  </div>
  <div id="trendChartWrap" class="trend-chart-wrap">
    <div class="trend-empty">记录体重后这里自动显示趋势 📊</div>
  </div>
  <div class="trend-axis" id="trendAxis"></div>

  <!-- 历史记录列表 -->
  <div style="margin-top:16px;font-size:12px;color:var(--sub);font-weight:600;margin-bottom:6px">最近记录</div>
  <div class="weight-log-list" id="weightLogList">
    <div style="color:var(--sub);font-size:13px;text-align:center;padding:12px">还没有记录</div>
  </div>
</div>

<!-- ===== 本周训练详情（自动从跟练页面读取） ===== -->
<div class="card" id="trainingCard" style="display:none">
  <div class="card-title"> 本周训练详情 <span style="font-size:11px;color:var(--sub);font-weight:400;margin-left:6px">（数据来自跟练完成记录）</span></div>
  <div class="training-grid" id="trainingGrid"></div>
  <div style="text-align:center;margin-top:8px;font-size:12px;color:var(--sub)" id="trainingSummary"></div>
</div>

<!-- ===== 本周回顾 ===== -->
<div class="card">
  <div class="card-title"> 本周回顾</div>

  <div class="field">
    <label>力量训练完成了几次？（目标 3 次）</label>
    <div class="qb" id="exBtns">
      <button class="qb-btn" onclick="setField('exercises','0次')">0次</button>
      <button class="qb-btn" onclick="setField('exercises','1次')">1次</button>
      <button class="qb-btn" onclick="setField('exercises','2次')">2次</button>
      <button class="qb-btn selected" onclick="setField('exercises','3次')">3次 ✓</button>
    </div>
  </div>

  <div class="field">
    <label>有氧日完成情况</label>
    <div class="qb" id="rdBtns">
      <button class="qb-btn" onclick="setField('cardio','没做')">没做</button>
      <button class="qb-btn" onclick="setField('cardio','1次')">1次</button>
      <button class="qb-btn" onclick="setField('cardio','2次')">2次 ✓</button>
      <button class="qb-btn selected" onclick="setField('cardio','2次')">2次 ✓</button>
    </div>
  </div>

  <div class="field">
    <label>饮食控制</label>
    <div class="qb" id="dtBtns">
      <button class="qb-btn" onclick="setField('diet','崩了')">崩了</button>
      <button class="qb-btn" onclick="setField('diet','一般')">一般</button>
      <button class="qb-btn selected" onclick="setField('diet','不错')">不错</button>
      <button class="qb-btn" onclick="setField('diet','完美')">完美 ✓</button>
    </div>
  </div>

  <div class="field">
    <label>睡眠质量</label>
    <div class="qb" id="slBtns">
      <button class="qb-btn" onclick="setField('sleep','很差')">很差</button>
      <button class="qb-btn" onclick="setField('sleep','一般')">一般</button>
      <button class="qb-btn selected" onclick="setField('sleep','不错')">不错</button>
      <button class="qb-btn" onclick="setField('sleep','很好')">很好 ✓</button>
    </div>
  </div>

  <div class="field">
    <label>备注（困难？调整想法？下周重点？）</label>
    <textarea id="notes" placeholder="比如：这周肩膀不怎么疼了、周三太累跳过了训练、下周要加重量..."></textarea>
  </div>

  <button class="save-btn" onclick="saveReview()">保存本周小结</button>
  <div class="saved-msg" id="savedMsg">✓ 已保存</div>
</div>

<!-- ===== 历史小结 ===== -->
<div class="card">
  <div class="card-title"> 历史小结</div>
  <div id="pastList">
    <div style="text-align:center;color:var(--sub);font-size:13px;padding:20px">还没有记录</div>
  </div>
</div>

<script>
// ========= 初始化 =========
const now = new Date();
document.getElementById('dateStr').textContent =
  `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} · 第${getWeekStr()}周`;

function getWeekStr() {
  const d = new Date(now);
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return mon.toISOString().slice(5, 10).replace('-', '/');
}

const todayStr = now.toISOString().slice(0, 10);
let review = { exercises: '3次', cardio: '2次', diet: '不错', sleep: '不错', notes: '' };
let reviews = JSON.parse(localStorage.getItem('fit_weekly_reviews') || '[]');

// ========= 减脂进度条 =========
(function renderGoalBar() {
  const wLog = JSON.parse(localStorage.getItem('fit_weight_log') || '[]');
  const start = 85, goal = 63;
  let latest = start;
  if (wLog.length) {
    const sorted = wLog.slice().sort((a, b) => b.date.localeCompare(a.date));
    latest = sorted[0].weight;
  }
  const progress = Math.min(100, Math.max(0, (start - latest) / (start - goal) * 100));
  document.getElementById('goalBar').style.width = progress.toFixed(1) + '%';
  const lost = (start - latest).toFixed(1);
  const remain = (latest - goal).toFixed(1);
  document.getElementById('progressTxt').textContent =
    latest + 'kg · 已减' + lost + 'kg · 还差' + remain + 'kg';
})();

// ========= 体重记录 =========
let weightLog = JSON.parse(localStorage.getItem('fit_weight_log') || '[]');

function logWeight() {
  const input = document.getElementById('weightInput');
  const val = parseFloat(input.value);
  if (!val || val < 40 || val > 200) {
    input.style.borderColor = '#ef4444';
    setTimeout(() => { input.style.borderColor = ''; }, 1000);
    return;
  }
  // 同一天覆盖
  const idx = weightLog.findIndex(e => e.date === todayStr);
  if (idx >= 0) weightLog[idx].weight = val;
  else weightLog.push({ date: todayStr, weight: val });
  weightLog.sort((a, b) => b.date.localeCompare(a.date));
  localStorage.setItem('fit_weight_log', JSON.stringify(weightLog));
  input.value = '';
  renderWeightLog();
  renderGoalBarLive(val);
}

function deleteWeight(date) {
  weightLog = weightLog.filter(e => e.date !== date);
  localStorage.setItem('fit_weight_log', JSON.stringify(weightLog));
  renderWeightLog();
}

function renderGoalBarLive(latest) {
  const start = 85, goal = 63;
  const progress = Math.min(100, Math.max(0, (start - latest) / (start - goal) * 100));
  document.getElementById('goalBar').style.width = progress.toFixed(1) + '%';
  const lost = (start - latest).toFixed(1);
  const remain = (latest - goal).toFixed(1);
  document.getElementById('progressTxt').textContent =
    latest + 'kg · 已减' + lost + 'kg · 还差' + remain + 'kg';
}

function renderWeightLog() {
  // 本周数据
  const d = new Date(now);
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1)); mon.setHours(0, 0, 0, 0);
  const weekEntries = weightLog.filter(e => {
    const ed = new Date(e.date); return ed >= mon;
  }).sort((a, b) => a.date.localeCompare(b.date));

  // 统计卡
  if (weekEntries.length >= 1) {
    const first = weekEntries[0], last = weekEntries[weekEntries.length - 1];
    const diff = (last.weight - first.weight).toFixed(1);
    const diffNum = parseFloat(diff);
    document.getElementById('wStart').textContent = first.weight + 'kg';
    document.getElementById('wLatest').textContent = last.weight + 'kg';
    const diffEl = document.getElementById('wDiff');
    diffEl.textContent = (diffNum < 0 ? '↓' : diffNum > 0 ? '↑' : '→') + ' ' + Math.abs(diff) + 'kg';
    diffEl.className = 'val ' + (diffNum < 0 ? 'down' : diffNum > 0 ? 'up' : 'flat');
  }

  // 7天条形图（周一到周日）
  const chart = document.getElementById('weekChart');
  const dayNames = ['一', '二', '三', '四', '五', '六', '日'];
  const dayDates = [];
  for (let i = 0; i < 7; i++) {
    const d2 = new Date(mon); d2.setDate(mon.getDate() + i);
    dayDates.push(d2.toISOString().slice(0, 10));
  }
  const dayWeights = dayDates.map(date => {
    const e = weightLog.find(w => w.date === date);
    return e ? e.weight : null;
  });
  const filled = dayWeights.filter(w => w !== null);
  const minW = filled.length ? Math.min(...filled) - 1 : 80;
  const maxW = filled.length ? Math.max(...filled) + 1 : 90;

  chart.innerHTML = dayDates.map((date, i) => {
    const w = dayWeights[i];
    const heightPct = w ? Math.max(15, ((w - minW) / (maxW - minW)) * 100) : 0;
    const isToday = date === todayStr;
    return `<div class="wc-day">
      <div class="wc-bar-wrap">
        <div class="wc-bar ${w ? 'filled' : ''}" 
             style="height:${w ? heightPct + '%' : '4px'};${isToday ? 'background:var(--primary);opacity:1' : (w ? 'background:rgba(249,115,22,0.5)' : '')}"></div>
      </div>
      <div class="wc-label" style="color:${isToday ? 'var(--primary)' : 'var(--sub)'}">${w ? w : '—'}</div>
    </div>`;
  }).join('');

  // 历史列表（最近10条）
  const listEl = document.getElementById('weightLogList');
  if (!weightLog.length) {
    listEl.innerHTML = '<div style="color:var(--sub);font-size:13px;text-align:center;padding:12px">还没有记录</div>';
    return;
  }
  listEl.innerHTML = weightLog.slice(0, 10).map((e, i) => {
    let diffHTML = '';
    if (i < weightLog.length - 1) {
      const prev = weightLog[i + 1].weight;
      const d = (e.weight - prev).toFixed(1);
      const cls = parseFloat(d) < 0 ? 'down' : parseFloat(d) > 0 ? 'up' : '';
      diffHTML = `<span class="wl-diff ${cls}">${parseFloat(d) < 0 ? '↓' : parseFloat(d) > 0 ? '↑' : '→'}${Math.abs(d)}kg</span>`;
    }
    return `<div class="wl-item">
      <span class="wl-date">${e.date}</span>
      <span class="wl-kg">${e.weight} kg</span>
      ${diffHTML}
      <button class="wl-del" onclick="deleteWeight('${e.date}')">×</button>
    </div>`;
  }).join('');
}

renderWeightLog();

// ========= 体重趋势折线图 =========
var trendDays = 30;

function renderTrendChart(days) {
  trendDays = days;
  // 更新按钮状态
  ['30','60','All'].forEach(function(k) {
    var btn = document.getElementById('trendBtn' + k);
    if (btn) btn.classList.remove('active');
  });
  var activeId = days === 30 ? 'trendBtn30' : days === 60 ? 'trendBtn60' : 'trendBtnAll';
  var activeBtn = document.getElementById(activeId);
  if (activeBtn) activeBtn.classList.add('active');

  var wrap = document.getElementById('trendChartWrap');
  var axisEl = document.getElementById('trendAxis');

  // 过滤数据
  var data = weightLog.slice().sort(function(a, b) { return a.date.localeCompare(b.date); });
  if (days > 0) {
    var cutoff = new Date(now);
    cutoff.setDate(cutoff.getDate() - days);
    var cutoffStr = cutoff.toISOString().slice(0, 10);
    data = data.filter(function(e) { return e.date >= cutoffStr; });
  }

  if (data.length < 2) {
    wrap.innerHTML = '<div class="trend-empty">至少需要 2 天记录才能显示趋势 📊</div>';
    if (axisEl) axisEl.innerHTML = '';
    return;
  }

  var weights = data.map(function(e) { return e.weight; });
  var minW = Math.min.apply(null, weights);
  var maxW = Math.max.apply(null, weights);
  var GOAL = 63;
  var chartMin = Math.min(minW - 0.5, GOAL - 0.5);
  var chartMax = maxW + 0.5;
  var range = chartMax - chartMin;

  var W = 320, H = 130; // SVG 内部坐标系
  var PAD_L = 30, PAD_R = 10, PAD_T = 12, PAD_B = 16;
  var plotW = W - PAD_L - PAD_R;
  var plotH = H - PAD_T - PAD_B;
  var n = data.length;

  function xPos(i) { return PAD_L + (n === 1 ? plotW / 2 : i / (n - 1) * plotW); }
  function yPos(w) { return PAD_T + (1 - (w - chartMin) / range) * plotH; }

  // 网格线（水平3条）
  var gridLines = '';
  var gridVals = [chartMin + range * 0.25, chartMin + range * 0.5, chartMin + range * 0.75].map(function(v) {
    return Math.round(v * 2) / 2;
  });
  gridVals.forEach(function(gv) {
    var gy = yPos(gv);
    gridLines += '<line x1="' + PAD_L + '" y1="' + gy.toFixed(1) + '" x2="' + (W - PAD_R) + '" y2="' + gy.toFixed(1) + '" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>';
    gridLines += '<text x="' + (PAD_L - 3) + '" y="' + (gy + 3.5).toFixed(1) + '" text-anchor="end" font-size="8" fill="rgba(0,0,0,0.3)">' + gv + '</text>';
  });

  // 目标线63kg
  var goalY = yPos(GOAL);
  var goalLine = '';
  if (GOAL >= chartMin && GOAL <= chartMax) {
    goalLine = '<line x1="' + PAD_L + '" y1="' + goalY.toFixed(1) + '" x2="' + (W - PAD_R) + '" y2="' + goalY.toFixed(1) + '" stroke="rgba(239,68,68,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>';
    goalLine += '<text x="' + (W - PAD_R + 2) + '" y="' + (goalY + 3).toFixed(1) + '" font-size="7" fill="rgba(239,68,68,0.7)">63</text>';
  }

  // 折线路径
  var points = data.map(function(e, i) { return xPos(i).toFixed(1) + ',' + yPos(e.weight).toFixed(1); });
  var polyline = '<polyline points="' + points.join(' ') + '" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';

  // 面积填充
  var areaPoints = [PAD_L + ','+  (PAD_T + plotH)];
  data.forEach(function(e, i) { areaPoints.push(xPos(i).toFixed(1) + ',' + yPos(e.weight).toFixed(1)); });
  areaPoints.push((W - PAD_R) + ',' + (PAD_T + plotH));
  var area = '<polygon points="' + areaPoints.join(' ') + '" fill="rgba(224,112,64,0.08)"/>';

  // 数据点
  var dots = '';
  data.forEach(function(e, i) {
    var cx = xPos(i).toFixed(1), cy = yPos(e.weight).toFixed(1);
    var isLast = i === n - 1;
    dots += '<circle cx="' + cx + '" cy="' + cy + '" r="' + (isLast ? '4' : '2.5') + '" fill="' + (isLast ? 'var(--primary)' : '#fff') + '" stroke="var(--primary)" stroke-width="2"/>';
    // 最新一个显示体重
    if (isLast) {
      dots += '<text x="' + cx + '" y="' + (parseFloat(cy) - 7).toFixed(1) + '" text-anchor="middle" font-size="9" font-weight="700" fill="var(--primary)">' + e.weight + '</text>';
    }
  });

  // 起止标注（最低点）
  var minIdx = weights.indexOf(minW);
  if (minIdx !== n - 1 && minIdx !== 0) {
    var mx = xPos(minIdx).toFixed(1), my = yPos(minW).toFixed(1);
    dots += '<text x="' + mx + '" y="' + (parseFloat(my) + 13).toFixed(1) + '" text-anchor="middle" font-size="8" fill="var(--cardio)">' + minW + '</text>';
  }

  wrap.innerHTML = '<svg class="trend-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
    gridLines + goalLine + area + polyline + dots +
    '</svg>';

  // X轴日期
  if (axisEl) {
    var show = Math.min(n, 5);
    var step = n <= 5 ? 1 : Math.floor(n / (show - 1));
    var axisItems = [];
    for (var i = 0; i < n; i += step) {
      axisItems.push(data[i].date.slice(5)); // MM-DD
    }
    if (axisItems[axisItems.length - 1] !== data[n - 1].date.slice(5)) {
      axisItems.push(data[n - 1].date.slice(5));
    }
    axisEl.innerHTML = axisItems.map(function(d) { return '<span>' + d + '</span>'; }).join('');
  }
}

// 初次渲染
renderTrendChart(30);

// ========= 本周训练详情（读取跟练完成记录） =========
(function renderTrainingStats() {
  var logs = JSON.parse(localStorage.getItem('jf_training_logs') || '[]');
  if (!logs.length) return;

  // 计算本周范围（周一到周日）
  var d = new Date(now);
  var day = d.getDay();
  var mon = new Date(d);
  mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  mon.setHours(0, 0, 0, 0);
  var sun = new Date(mon);
  sun.setDate(mon.getDate() + 7);

  var weekLogs = logs.filter(function(l) {
    var ld = new Date(l.date);
    return ld >= mon && ld < sun;
  });

  if (!weekLogs.length) return;

  // 统计
  var strengthCount = 0, cardioCount = 0, totalTime = 0, totalCal = 0, totalSets = 0;
  var dayMap = {}; // { '2026-06-30': { type: 'pull', mins: 45 } }
  weekLogs.forEach(function(l) {
    var mins = Math.round(l.duration / 60);
    totalTime += l.duration;
    totalCal += l.calories || 0;
    totalSets += l.setsCompleted || 0;
    if (l.dayType === 'pull' || l.dayType === 'push' || l.dayType === 'leg') {
      strengthCount++;
    } else if (l.dayType === 'cardio') {
      cardioCount++;
    }
    if (!dayMap[l.date]) dayMap[l.date] = { type: l.dayType, mins: 0 };
    dayMap[l.date].mins += mins;
    // 优先记录力量训练天
    if (l.dayType !== 'cardio' && l.dayType !== 'recovery') dayMap[l.date].type = l.dayType;
    else if (l.dayType === 'cardio' && dayMap[l.date].type !== 'pull' && dayMap[l.date].type !== 'push' && dayMap[l.date].type !== 'leg') dayMap[l.date].type = l.dayType;
  });

  // 渲染7天网格
  var dayDates = [];
  var dayNames = ['一', '二', '三', '四', '五', '六', '日'];
  var typeIcons = { pull: '🔵', push: '🟠', leg: '🔴', cardio: '🟢', recovery: '🟣' };
  for (var i = 0; i < 7; i++) {
    var d2 = new Date(mon);
    d2.setDate(mon.getDate() + i);
    dayDates.push(d2.toISOString().slice(0, 10));
  }

  var gridHTML = dayDates.map(function(date, i) {
    var info = dayMap[date];
    var dotClass = info ? info.type : '';
    var icon = info ? (typeIcons[info.type] || '') : '';
    var isToday = date === todayStr;
    var minsText = info ? info.mins + '′' : '';
    return '<div class="tg-day">' +
      '<div class="tg-day-label">' + dayNames[i] + '</div>' +
      '<div class="tg-day-dot' + (dotClass ? ' ' + dotClass : '') + (isToday ? ' today' : '') + '">' + (info ? icon : '—') + '</div>' +
      '<div class="tg-day-mins">' + minsText + '</div>' +
    '</div>';
  }).join('');

  document.getElementById('trainingGrid').innerHTML = gridHTML;
  document.getElementById('trainingSummary').textContent =
    '力量 ' + strengthCount + '次  ·  有氧 ' + cardioCount + '次  ·  共 ' + Math.round(totalTime / 60) + '分钟  ·  ' + totalSets + '组  ·  ≈' + totalCal + ' kcal';

  // 显示卡片
  var card = document.getElementById('trainingCard');
  if (card) card.style.display = '';

  // 自动填充周回顾表单的力量训练次数
  if (strengthCount > 0) {
    var countText = strengthCount + '次';
    var fieldSet = false;
    document.querySelectorAll('#exBtns .qb-btn').forEach(function(b) {
      b.classList.toggle('selected', b.textContent.trim().startsWith(countText));
      if (b.textContent.trim().startsWith(countText)) fieldSet = true;
    });
    if (fieldSet) review.exercises = countText;
    // 如果按钮中没有匹配的数量，动态添加一个
    if (!fieldSet) {
      var exBtns = document.getElementById('exBtns');
      var existing = exBtns.querySelectorAll('.qb-btn');
      for (var ei = 0; ei < existing.length; ei++) {
        existing[ei].classList.remove('selected');
      }
      var newBtn = document.createElement('button');
      newBtn.className = 'qb-btn selected';
      newBtn.textContent = countText + ' ✓';
      newBtn.onclick = function() { setField('exercises', countText); };
      exBtns.appendChild(newBtn);
      review.exercises = countText;
    }
  }
  // 自动填充有氧次数
  if (cardioCount > 0) {
    var cardioText = cardioCount + '次';
    var cf = false;
    document.querySelectorAll('#rdBtns .qb-btn').forEach(function(b) {
      b.classList.toggle('selected', b.textContent.trim().startsWith(cardioText));
      if (b.textContent.trim().startsWith(cardioText)) cf = true;
    });
    if (cf) review.cardio = cardioText;
    else {
      var rdBtns = document.getElementById('rdBtns');
      if (rdBtns) {
        var existing2 = rdBtns.querySelectorAll('.qb-btn');
        for (var ei = 0; ei < existing2.length; ei++) {
          existing2[ei].classList.remove('selected');
        }
        var nb = document.createElement('button');
        nb.className = 'qb-btn selected';
        nb.textContent = cardioText + ' ✓';
        nb.onclick = function() { setField('cardio', cardioText); };
        rdBtns.appendChild(nb);
        review.cardio = cardioText;
      }
    }
  }
})();

// ========= 周回顾表单 =========
function setField(field, value) {
  review[field] = value;
  const groupMap = { exercises: 'ex', cardio: 'rd', diet: 'dt', sleep: 'sl' };
  const groupId = groupMap[field] + 'Btns';
  document.querySelectorAll('#' + groupId + ' .qb-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.trim().startsWith(value));
  });
}

// 修正有氧按钮逻辑（去掉重复项）
document.addEventListener('DOMContentLoaded', function() {
  const rdBtns = document.getElementById('rdBtns');
  rdBtns.innerHTML = `
    <button class="qb-btn" onclick="setField('cardio','没做')">没做</button>
    <button class="qb-btn" onclick="setField('cardio','1次')">1次</button>
    <button class="qb-btn selected" onclick="setField('cardio','2次')">2次 ✓</button>
  `;
});

function saveReview() {
  review.notes = document.getElementById('notes').value;
  const d = new Date(now);
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const weekStr = `${mon.toISOString().slice(0, 10)} ~ ${sun.toISOString().slice(0, 10)}`;

  // 加入当前体重
  const latestWeight = weightLog.length ? weightLog[0].weight : null;
  const entry = { week: weekStr, ...review, weight: latestWeight, savedAt: todayStr };

  const idx = reviews.findIndex(r => r.week === weekStr);
  if (idx >= 0) reviews[idx] = entry; else reviews.push(entry);
  reviews.sort((a, b) => b.week.localeCompare(a.week));
  localStorage.setItem('fit_weekly_reviews', JSON.stringify(reviews));

  document.getElementById('savedMsg').classList.add('show');
  setTimeout(() => document.getElementById('savedMsg').classList.remove('show'), 2500);
  document.getElementById('notes').value = '';
  renderPast();
}

function renderPast() {
  const container = document.getElementById('pastList');
  if (!reviews.length) {
    container.innerHTML = '<div style="text-align:center;color:var(--sub);font-size:13px;padding:20px">还没有记录</div>';
    return;
  }
  container.innerHTML = reviews.slice(0, 12).map(r => `
    <div class="past-item">
      <div class="past-week">📅 ${r.week}</div>
      <div class="past-meta">
        训练 ${r.exercises} · 有氧 ${r.cardio || '--'} · 饮食 ${r.diet} · 睡眠 ${r.sleep}
        ${r.weight ? ` · <b>${r.weight}kg</b>` : ''}
      </div>
      ${r.notes ? `<div class="past-notes">💬 ${r.notes}</div>` : ''}
    </div>
  `).join('');
}

renderPast();
