/* ===== 今日计划页专属样式 ===== */

/* Today Card (Hero) */
.today-hero {
 margin: 0 10px 10px; background: var(--card);
 border: 1px solid rgba(249,115,22,0.3); border-radius: var(--radius); overflow: hidden;
 box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.02);
}
.today-hero .th-top {
 padding: 18px 20px 12px; display: flex; justify-content: space-between; align-items: flex-start;
}
.th-date { font-size: 32px; font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; }
.th-date .dow { font-weight: 500; font-size: 13px; color: var(--sub); display: block; letter-spacing: 0; margin-top: 2px; }
.th-badge {
 padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap;
 background: rgba(249,115,22,0.12); color: var(--primary); letter-spacing: 0.03em;
}

/* Weather inline */
.th-wx {
 display: flex; align-items: center; gap: 10px; padding: 10px 16px;
 margin: 0 6px 8px; background: rgba(249,115,22,0.04); border-radius: var(--radius-sm);
 font-size: 15px;
}
.th-wx .wx-icon { font-size: 26px; flex-shrink: 0; }
.th-wx .wx-temp { font-weight: 800; font-size: 22px; color: var(--primary); }
.th-wx .wx-detail { flex: 1; line-height: 1.4; font-size: 14px; color: var(--sub); }
.th-wx .wx-tag {
 font-size: 12px; padding: 2px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap;
}
.wx-tag.ok { background: rgba(34,197,94,0.1); color: var(--cardio); }
.wx-tag.no { background: rgba(239,68,68,0.1); color: var(--danger); }

/* Weather skeleton */
.wx-skeleton {
 display: flex; align-items: center; gap: 10px; padding: 10px 16px;
 margin: 0 6px 8px; background: rgba(0,0,0,0.02); border-radius: var(--radius-sm);
}
.skel { background: var(--border); border-radius: 4px; animation: skelPulse 1.5s ease-in-out infinite; }
.skel-icon { width: 26px; height: 26px; border-radius: 50%; }
.skel-text { height: 10px; flex: 1; }
@keyframes skelPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

/* Section blocks */
.th-section { padding: 0 20px 10px; }
.th-section-title {
 color: var(--sub);
 font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;
 margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
}
.th-block {
 padding: 10px 14px; border-radius: var(--radius-sm); font-size: 14px; line-height: 1.55; margin-bottom: 6px;
}
.th-block.morning { background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.12); color: var(--text); }
.th-block.evening { background: rgba(129,140,248,0.06); border: 1px solid rgba(129,140,248,0.12); color: var(--text); }
.th-block.dinner { background: rgba(34,197,94,0.05); border: 1px solid rgba(34,197,94,0.1); color: var(--text); }
.th-block.move-item { background: rgba(249,115,22,0.04); border: 1px solid rgba(249,115,22,0.08); }
.th-block.warn { background: rgba(245,158,11,0.05); border: 1px solid rgba(245,158,11,0.1); }

.th-block b { font-weight: 800; color: var(--text); }
.th-block .sub { font-size: 13px; color: var(--sub); display: block; margin-top: 2px; font-weight: 400; }

.move-row {
 display: flex; align-items: center; gap: 8px; padding: 5px 0;
 border-bottom: 1px solid rgba(0,0,0,0.03); font-size: 14px; font-weight: 500;
}
.move-row:last-child { border-bottom: none; }
.move-name { flex: 1; color: var(--text); }
.move-sets { color: var(--sub); white-space: nowrap; font-size: 12px; font-weight: 600; }

.th-data {
 display: flex; gap: 1px; border-top: 1px solid var(--border);
 background: var(--border);
}
.th-data-item {
 flex: 1; background: var(--card); padding: 14px 6px; text-align: center;
}
.th-data-item .val { font-size: 26px; font-weight: 800; display: block; line-height: 1; }
.th-data-item .lbl { font-size: 11px; color: var(--sub); margin-top: 4px; font-weight: 600; letter-spacing: 0.04em; }
.th-data-item .val.protein { color: var(--cardio); }
.th-data-item .val.water { color: #60a5fa; }
.th-data-item .val.exercise { color: var(--primary); }
.th-data-item .val.sleep { color: var(--sleep); }

/* ===== Tomorrow Card ===== */
.tm-card { margin: 0 10px 10px; }
.tm-card .tm-top {

.tm-date { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.tm-date .dow { font-weight: 500; font-size: 13px; color: var(--sub); display: block; letter-spacing: 0; margin-top: 1px; }

}
.tm-wx {
 display: flex; align-items: center; gap: 8px; padding: 8px 10px;
 background: rgba(59,130,246,0.03); border-radius: var(--radius-sm); font-size: 14px; margin-bottom: 6px;
}
.tm-plan {
 padding: 6px 10px; font-size: 14px; line-height: 1.5; color: var(--text); font-weight: 500;
 background: rgba(0,0,0,0.02); border-radius: 7px;
}

.tl-outer { margin: 0 10px 10px; padding: 14px 0 14px 14px; }
.tl-title {
 font-size: 13px; font-weight: 700; color: var(--recovery); padding: 0 2px 6px 0;
 display: flex; align-items: center; gap: 5px; letter-spacing: 0.08em; text-transform: uppercase;
}
.tl-scroll {
 overflow-x: auto; overflow-y: hidden;
 -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
 -ms-overflow-style: none; scrollbar-width: none;
}
.tl-scroll::-webkit-scrollbar { height: 0; display: none; }
.tl-track { white-space: nowrap; }
.tl-item {
 display: inline-block; vertical-align: top; width: 115px;
 background: var(--surface); border: 1px solid var(--border);
 border-radius: 8px; padding: 7px 8px; margin-right: 6px;
 white-space: normal; position: relative;
}
.tl-item.now { border-color: var(--recovery); box-shadow: 0 0 8px rgba(167,139,250,0.06); }
.tl-item .tl-time { font-size: 12px; font-weight: 700; margin-bottom: 2px; letter-spacing: 0.02em; }
.tl-time.food { color: var(--cardio); }
.tl-time.water { color: #60a5fa; }
.tl-time.exercise { color: var(--primary); }
.tl-time.move { color: var(--recovery); }
.tl-time.sleep { color: var(--sleep); }
.tl-time.rest { color: var(--sub); }
.tl-item .tl-txt { font-size: 13px; line-height: 1.4; color: var(--sub); font-weight: 400; }

details summary { cursor: pointer; color: var(--primary); font-size: 13px; font-weight: 600; padding: 2px 0; }
details .inner { padding: 6px 0; }

/* ===== 今日饮食卡片 ===== */
.meal-today-card {
  margin: 0 10px 10px; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.mt-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 14px 16px 6px;
}
.mt-header-left { flex: 1; }
.mt-title { font-size: 16px; font-weight: 800; }
.mt-date { font-size: 11px; color: var(--sub); margin-top: 2px; }
.mt-edit-link {
  font-size: 12px; font-weight: 600; color: var(--primary);
  text-decoration: none; padding: 5px 12px;
  background: rgba(249,115,22,0.08); border-radius: 8px;
  white-space: nowrap; flex-shrink: 0;
}
.mt-meal-row {
  padding: 10px 14px; border-top: 1px solid var(--border);
  border-left: 4px solid #ccc;
}
.mt-meal-row.breakfast { border-left-color: var(--morning); }
.mt-meal-row.lunch { border-left-color: var(--cardio); }
.mt-meal-row.dinner { border-left-color: var(--recovery); }
.mt-meal-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 4px;

.mt-meal-name { font-size: 14px; font-weight: 800; }
.mt-meal-name.bf { color: #92400e; }
.mt-meal-name.lu { color: #166534; }
.mt-meal-name.dn { color: #6d28d9; }
.mt-meal-kcal { font-size: 12px; color: var(--sub); font-weight: 600; }
.mt-food-item {

.mt-food-icon { width: 20px; text-align: center; flex-shrink: 0; font-size: 14px; }
.mt-food-name { font-weight: 600; min-width: 55px; color: var(--text); }
.mt-food-portion { color: var(--sub); font-size: 11px; }
.mt-food-pro { color: var(--pull); font-size: 10px; font-weight: 600; margin-left: auto; white-space: nowrap; }
.mt-oil-note { font-size: 10px; color: var(--sub); padding-left: 25px; }

  padding: 10px 14px; border-top: 2px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 5px; align-items: center;

.mt-total-label { font-size: 13px; font-weight: 800; }
.mt-stat { font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: 700; }
.mt-stat-cal { background: rgba(249,115,22,0.12); color: var(--primary); }
.mt-stat-pro { background: rgba(59,130,246,0.12); color: var(--pull); }

.mt-stat-fat { background: rgba(34,197,94,0.12); color: #166534; }

.mt-status-ok { color: var(--cardio); }
.mt-status-warn { color: var(--warn); }

  padding: 24px 16px; text-align: center; color: var(--sub); font-size: 13px;

.mt-empty a { color: var(--primary); font-weight: 600; text-decoration: none; }

/* ===== 补剂提醒卡片 ===== */
.supp-today-card {
  margin: 0 10px 10px; padding: 14px;
  background: linear-gradient(135deg, #fffbeb 0%, #fefce8 100%);
  border: 2px solid #fde68a; border-radius: var(--radius);

.supp-title-row { display: flex; justify-content: space-between; align-items: baseline; }
.supp-title { font-size: 16px; font-weight: 800; color: #92400e; }
.supp-date { font-size: 11px; color: var(--sub); }
.supp-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.supp-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; background: rgba(255,255,255,.75);
  border: 1px solid #fde68a; border-radius: 10px;
  transition: all .2s; cursor: pointer; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.supp-item:active { transform: scale(.98); }
.supp-item.done { background: #f0fdf4; border-color: #bbf7d0; }
.supp-check {
  flex-shrink: 0; width: 24px; height: 24px; margin-top: 1px;
  border: 2px solid #d6d3cd; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: transparent;
  transition: all .15s;
}
.supp-item.done .supp-check { background: #22c55e; border-color: #22c55e; color: #fff; }
.supp-info { flex: 1; min-width: 0; }
.supp-name-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
.supp-name { font-size: 13px; font-weight: 800; color: var(--text); }
.supp-item.done .supp-name { text-decoration: line-through; color: var(--sub); }
.supp-dose {
  padding: 1px 8px; font-size: 11px; font-weight: 700; border-radius: 4px;
  background: rgba(59,130,246,0.12); color: var(--pull);

.supp-item.done .supp-dose { opacity: .5; }
.supp-time { font-size: 11px; color: #78716c; line-height: 1.5; }
.supp-tip { font-size: 10px; color: var(--sub); line-height: 1.5; margin-top: 2px; }
.supp-progress { margin-top: 10px; display: flex; align-items: center; gap: 8px; }
.supp-progress-track { flex: 1; height: 6px; background: rgba(0,0,0,.06); border-radius: 3px; overflow: hidden; }
.supp-progress-fill {
  height: 100%; background: linear-gradient(90deg, #f59e0b 0%, #22c55e 100%);
  border-radius: 3px; transition: width .3s ease; width: 0%;
}
.supp-progress-text { font-size: 11px; font-weight: 700; color: #92400e; white-space: nowrap; }

// ========== RENDER TODAY ==========
function renderToday(d) {
 const mm = now.getMonth() + 1, dd = now.getDate();

 // Weather
 let wxHTML = '';
 if (d) {
 const c = d.current_condition[0], w = d.weather[0];
 const code = parseInt(c.weatherCode);
 const evRain = w.hourly.filter(h => {
 const hr = parseInt(h.time) / 100;
 return hr >= 17 && hr <= 20;
 }).some(h => parseInt(h.chanceofrain) > 30);
 wxHTML = `<div class="th-wx">
 <span class="wx-icon">${wxEmo(code)}</span>
 <span class="wx-temp">${c.temp_C}°C</span>
 <div class="wx-detail">${c.weatherDesc[0].value} · 湿度${c.humidity}% · 体感${c.FeelsLikeC}°C</div>
 <span class="wx-tag ${evRain ? 'no' : 'ok'}">${evRain ? '傍晚有雨' : '晴好'}</span>
 </div>`;
 } else {
 wxHTML = `<div class="wx-skeleton">
 <div class="skel skel-icon"></div>
 <div class="skel skel-text"></div>
 <div style="font-size: 13px;color:var(--sub);flex-shrink:0">加载天气...</div>
 </div>`;
 }

 // Morning block
 let moHTML = '';
 if (p.morning) {
 moHTML = `<div class="th-block morning">
 <b>早上 ${p.morning.type}</b>
 <span class="sub">${p.morning.txt}</span>
 </div>`;
 }

 // Evening block
 let evHTML = '';
 if (p.evening) {
 evHTML = `<div class="th-block evening">

 }

 // Training day badge color
 let badgeColor = 'var(--cardio)';
 if (['拉日训练','推日训练','腿日训练'].includes(p.l)) badgeColor = 'var(--primary)';

 document.getElementById('todayCard').innerHTML = `

// ========== RENDER TIMELINE ==========
function renderTimeline() {
 const hr = now.getHours(), mn = now.getMinutes();
 const tNow = hr * 60 + mn;
 let best = 0, bestDiff = 999999;
 p.s.forEach((s, i) => {
 const parts = s.t.split(':');
 const tVal = parseInt(parts[0]) * 60 + parseInt(parts[1]);
 const diff = tVal - tNow;
 if (diff <= 0 && Math.abs(diff) < bestDiff) { bestDiff = Math.abs(diff); best = i; }
 });

 let cards = '';
 p.s.forEach((s, i) => {
 cards += `<div class="tl-item${i === best ? ' now' : ''}">
 <div class="tl-time ${s.bar}">${s.t}</div>
 <div class="tl-txt">${s.txt}</div>
 </div>`;
 });

 document.getElementById('timelineCard').innerHTML = `
 <div class="tl-title">今日时间轴</div>
 <div class="tl-scroll" id="tlScroll">
 <div class="tl-track">${cards}</div>
 </div>
 `;

 setTimeout(() => {
 const scroll = document.getElementById('tlScroll');
 if (!scroll) return;
 const items = scroll.querySelectorAll('.tl-item');
 let target = items[best];
 if (!target) target = items[Math.floor(items.length / 2)];
 const left = target.offsetLeft - scroll.clientWidth / 2 + target.offsetWidth / 2;
 scroll.scrollLeft = Math.max(0, left);
 }, 200);
}

  '南瓜':     { cat:'staple',cal:26, pro:1,  carb:6,  fat:0.1,unit:'g',     meals:['lunch','dinner'] },
  '杂粮饭':   { cat:'staple',cal:140,pro:3.5,carb:28, fat:0.8,unit:'g熟重', meals:['lunch','dinner'] },
  '米饭':     { cat:'staple',cal:116,pro:2.6,carb:25.9,fat:0.3,unit:'g熟重',meals:['lunch','dinner'] },
  '土豆':     { cat:'staple',cal:81, pro:2,  carb:17.5,fat:0.2,unit:'g',    meals:['lunch','dinner'] },
};
const CAT_ICONS_T = { meat:'🥩', soy:'🫘', veg:'🥬', staple:'🍚' };
const MEAL_LABELS_T = { breakfast:'早餐', lunch:'午餐', dinner:'晚餐' };
const MEAL_KEYS_T = ['breakfast','lunch','dinner'];
const DAY_IDS_T = ['sun','mon','tue','wed','thu','fri','sat']; // getDay(): 0=Sun

function calcPortion(food, meal) {
  const f = FOODS[food];
  if (f.cat === 'meat') {
    if (food === '鸡蛋') return { g:100, note:'2个蛋≈26g蛋白' };
    if (food === '牛奶') return { g:250, note:'全脂牛奶≈135kcal' };
    if (food === '无糖酸奶') return { g:200, note:'200ml≈126kcal' };
    const calTarget = (meal === 'lunch') ? 250 : 200;
    let raw = Math.round(calTarget / f.cal * 100 / 5) * 5;
    if (raw > 250) raw = 250; if (raw < 100) raw = 100;
    return { g:raw };
  }
  if (f.cat === 'soy') {
    if (food === '无糖豆浆') return { g:250, note:'无糖·低热量' };
    if (food === '千张') return { g:70, note:'热量偏高·配蔬菜' };
    if (food === '豆干') return { g:100 };
    return { g:200 };
  }
  if (f.cat === 'veg') return { g:250 };
  if (f.cat === 'staple') {
    if (food === '燕麦片') return { g:50, note:'50g干重≈一碗粥' };
    if (food === '全麦面包') return { g:80, note:'≈2~3片' };
    if (food === '南瓜') return { g:300, note:'碳水偏低·搭配其他' };
    const calTarget = (meal === 'lunch') ? 280 : 230;
    let raw = Math.round(calTarget / f.cal * 100 / 5) * 5;
    if (raw > 350) raw = 350; if (raw < 50) raw = 50;
    return { g:raw };
  }
  return { g:150 };
}

function calcMacros(food, grams) {
  const f = FOODS[food], r = grams/100;
  return { cal:Math.round(f.cal*r), pro:Number((f.pro*r).toFixed(1)), carb:Number((f.carb*r).toFixed(1)), fat:Number((f.fat*r).toFixed(1)) };
}

// ---- 今日饮食渲染 ----
function renderTodayMeals() {
  const card = document.getElementById('mealTodayCard');
  if (!card) return;

  // 读周计划
  let weeklySel = {};
  try { weeklySel = JSON.parse(localStorage.getItem('jf_weekly_plan_v3') || '{}'); } catch(e) {}

  const todayDayId = DAY_IDS_T[DI]; // mon/tue/...
  const sel = weeklySel[todayDayId];

  // 日期显示
  const weekDay = DAYS[DI];
  const dateStr = (now.getMonth()+1) + '月' + now.getDate() + '日 周' + weekDay;

  if (!sel) {
    card.innerHTML = `
      <div class="mt-header">
        <div class="mt-header-left">
          <div class="mt-title">🍽️ 今日饮食</div>
          <div class="mt-date">${dateStr}</div>
        </div>
        <a class="mt-edit-link" href="饮食参考.html">去设置 →</a>
      </div>
      <div class="mt-empty">还未设置饮食计划<br><a href="饮食参考.html">点击去饮食页设置本周三餐 →</a></div>
    `;
    return;
  }

  // 确保数据结构
  MEAL_KEYS_T.forEach(function(m) {
    if (!sel[m]) sel[m] = {meat:null,soy:null,veg:[],staple:null};
    if (m==='breakfast') {
      if (typeof sel[m].meat === 'string') sel[m].meat = [sel[m].meat];
      if (!Array.isArray(sel[m].meat)) sel[m].meat = [];
    }
    if (!sel[m].veg) sel[m].veg = [];
  });

  let html = `
    <div class="mt-header">
      <div class="mt-header-left">
        <div class="mt-title">🍽️ 今日饮食</div>
        <div class="mt-date">${dateStr}</div>
      </div>
      <a class="mt-edit-link" href="饮食参考.html">去设置 →</a>
    </div>
  `;

  let dCal=0, dPro=0, dCarb=0, dFat=0;

  MEAL_KEYS_T.forEach(function(meal) {
    const s = sel[meal];
    const mealClass = meal === 'breakfast' ? 'breakfast' : (meal === 'lunch' ? 'lunch' : 'dinner');
    const nameClass = meal === 'breakfast' ? 'bf' : (meal === 'lunch' ? 'lu' : 'dn');

    // 构建食物列表
    let foods = [];
    if (meal === 'breakfast' && Array.isArray(s.meat)) {
      s.meat.forEach(function(mn) { foods.push({name:mn, cat:'meat'}); });
    } else if (s.meat) {
      foods.push({name:s.meat, cat:'meat'});
    }
    if (s.soy) foods.push({name:s.soy, cat:'soy'});
    if (s.veg) s.veg.forEach(function(v) { foods.push({name:v, cat:'veg'}); });
    if (s.staple) foods.push({name:s.staple, cat:'staple'});

    let mCal=0, mPro=0, items=[];
    foods.forEach(function(item) {
      const p = calcPortion(item.name, meal);
      const m = calcMacros(item.name, p.g);
      items.push(`<div class="mt-food-item">
        <span class="mt-food-icon">${CAT_ICONS_T[item.cat]}</span>
        <span class="mt-food-name">${item.name}</span>
        <span class="mt-food-portion">${p.g}${FOODS[item.name].unit}</span>
        <span class="mt-food-pro">蛋白${m.pro}g</span>
      </div>`);
      mCal += m.cal; mPro += m.pro;
      dCal += m.cal; dPro += m.pro; dCarb += m.carb; dFat += m.fat;
    });

    let oilNote = '';
    if (meal !== 'breakfast' && foods.length > 0) {
      mCal += 45; dCal += 45; dFat += 5;
      oilNote = '<div class="mt-oil-note">烹饪油 ~5g（一茶匙）</div>';
    }

    html += `<div class="mt-meal-row ${mealClass}">
      <div class="mt-meal-head">
        <span class="mt-meal-name ${nameClass}">${MEAL_LABELS_T[meal]}</span>
        <span class="mt-meal-kcal">${foods.length > 0 ? '~' + mCal + ' kcal' : '未设置'}</span>
      </div>
      ${items.length > 0 ? items.join('') + oilNote : '<div style="font-size:12px;color:var(--sub);padding:4px 0">去饮食页设置 →</div>'}
    </div>`;
  });

  // 全天合计
  const proOk = dPro >= 98;
  const calOk = dCal >= 1700 && dCal <= 2000;
  html += `<div class="mt-total">
    <span class="mt-total-label">全天合计</span>
    <span class="mt-stat mt-stat-cal">${dCal} kcal</span>
    <span class="mt-stat mt-stat-pro">蛋白 ${dPro.toFixed(1)}g</span>
    <span class="mt-stat mt-stat-carb">碳水 ${dCarb.toFixed(1)}g</span>
    <span class="mt-stat mt-stat-fat">脂肪 ${dFat.toFixed(1)}g</span>
    <div class="mt-status-row">
      ${proOk ? '<span class="mt-status-ok">✅ 蛋白达标(≥98g)</span>' : '<span class="mt-status-warn">⚠️ 蛋白不足(<98g)</span>'}
      &nbsp;&nbsp;
      ${calOk ? '<span class="mt-status-ok">✅ 热量在目标范围</span>' : '<span class="mt-status-warn">⚠️ 热量偏离目标</span>'}
    </div>
  </div>`;

  card.innerHTML = html;
}

// ---- 补剂提醒 ----
const SUPPS = [
  { id:'protein', icon:'💪', name:'乳清蛋白粉', dose:'30g（1勺）',
    time:'训练日：训练后30分钟内 · 休息日：下午15:00-16:00加餐',
    tip:'训练后肌肉吸收率最高；休息日下午补蛋白合成低谷' },
  { id:'fishoil', icon:'🐟', name:'鱼油', dose:'2颗',
    time:'午餐1颗 + 晚餐1颗',
    tip:'随餐服用吸收好，分两次减少鱼腥打嗝' },
  { id:'vd3', icon:'☀️', name:'维生素D3', dose:'1颗',
    time:'随早餐服用（牛奶+鸡蛋含脂肪，帮助吸收）',
    tip:'脂溶性维生素，必须随含脂肪的餐食吃' }
];

function getTodayKeySupp() {
  return now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0')+'-'+now.getDate().toString().padStart(2,'0');
}

function getSuppState() {
  try { return JSON.parse(localStorage.getItem('jf_supp_'+getTodayKeySupp()) || '{}'); }
  catch(e) { return {}; }
}

function saveSuppState(state) {
  localStorage.setItem('jf_supp_'+getTodayKeySupp(), JSON.stringify(state));
}

function renderSuppCard() {
  const card = document.getElementById('suppTodayCard');
  if (!card) return;

  const state = getSuppState();
  const weekDay = DAYS[DI];
  const dateStr = (now.getMonth()+1) + '月' + now.getDate() + '日 周' + weekDay;

  let html = `
    <div class="supp-title-row">
      <span class="supp-title">💊 每日补剂提醒</span>
      <span class="supp-date">${dateStr}</span>
    </div>
    <div class="supp-list">
  `;

  SUPPS.forEach(function(s) {
    const done = state[s.id];
    html += `<div class="supp-item${done ? ' done' : ''}" data-supp="${s.id}">
      <div class="supp-check">${done ? '✓' : ''}</div>
      <div class="supp-info">
        <div class="supp-name-row">
          <span style="font-size:16px">${s.icon}</span>
          <span class="supp-name">${s.name}</span>
          <span class="supp-dose">${s.dose}</span>
        </div>
        <div class="supp-time">⏰ ${s.time}</div>
        <div class="supp-tip">💡 ${s.tip}</div>
      </div>
    </div>`;
  });

  const doneCount = SUPPS.filter(function(s) { return state[s.id]; }).length;
  html += `</div>
    <div class="supp-progress">
      <div class="supp-progress-track"><div class="supp-progress-fill" style="width:${doneCount/SUPPS.length*100}%"></div></div>
      <span class="supp-progress-text">${doneCount}/${SUPPS.length}${doneCount===3 ? ' ✅' : ''}</span>
    </div>
  `;

  card.innerHTML = html;

  // 绑定点击
  card.querySelectorAll('.supp-item').forEach(function(item) {
    const sid = item.getAttribute('data-supp');
    item.addEventListener('click', function(e) { e.preventDefault(); toggleSupp(sid); });
    item.addEventListener('touchend', function(e) { e.preventDefault(); toggleSupp(sid); });
  });
}

function toggleSupp(id) {
  const state = getSuppState();
  state[id] = !state[id];
  saveSuppState(state);
  renderSuppCard();
}

// ========== MASTER RENDER ==========
function renderAll(d) {
 renderToday(d);
 renderTodayMeals();
 renderSuppCard();
 renderTomorrow();
 renderTimeline();
}

function processWeather(d) {
  if (d) { tomorrowWeather = extractTomorrow(d); }
  renderAll(d);
}

renderAll(null);
fetchWeather(processWeather);

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('/jf/serviceWorker.js').catch(function () {});
}
