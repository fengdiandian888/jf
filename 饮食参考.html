<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#faf8f5">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="shared.css">
<title>饮食参考 · 减脂计划</title>
<style>
:root {
  --primary: #e07040; --pull: #60a5fa; --push: #f59e0b;
  --warn: #f59e0b; --cardio: #4ade80; --recovery: #a78bfa;
  --danger: #ef4444; --text: #1e1e1e; --sub: #888;
  --surface: #faf8f5; --border: #e5e0d8;
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 0 0 80px; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background: var(--surface); color: var(--text); line-height: 1.65; font-size: 14px;
  -webkit-tap-highlight-color: transparent;
}

h1 { font-size: 20px; text-align: center; padding: 12px 0 0; color: var(--primary); margin: 0; }
.subtitle { text-align: center; font-size: 11px; color: var(--sub); margin: 2px 0 10px; line-height: 1.6; }

.goal-card { margin: 0 10px 10px; padding: 10px 12px; background: #fff; border: 1px solid var(--border); border-radius: 10px; }
.goal-row { display: flex; justify-content: space-around; text-align: center; }
.goal-item { flex: 1; }
.goal-val { font-size: 17px; font-weight: 800; }
.goal-label { font-size: 10px; color: var(--sub); margin-top: 1px; }

.daily-wrapper { margin: 0 10px 12px; }

.meal-panel {
  background: #fff; border-radius: 12px; margin-bottom: 11px;
  border-left: 4px solid #ccc; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.meal-panel.meal-breakfast { border-left-color: #f59e0b; }
.meal-panel.meal-lunch     { border-left-color: #4ade80; }
.meal-panel.meal-dinner    { border-left-color: #a78bfa; }

.meal-head {
  padding: 11px 14px 5px; font-size: 15px; font-weight: 800;
  display: flex; justify-content: space-between; align-items: baseline;
}
.meal-breakfast .meal-head { color: #92400e; }
.meal-lunch .meal-head     { color: #166534; }
.meal-dinner .meal-head    { color: #6d28d9; }

.meal-target-row {
  padding: 0 14px 6px; font-size: 11px; color: var(--sub);
}

.meal-chips { padding: 0 10px 6px; }

.food-section { margin-bottom: 6px; }
.food-section h3 {
  font-size: 11px; color: var(--sub); margin: 0 0 4px 4px; font-weight: 600;
}
.food-chips { display: flex; flex-wrap: wrap; gap: 5px; }

.food-chip {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 5px 11px; border-radius: 16px; border: 1.5px solid var(--border);
  background: var(--surface); font-size: 12px; font-weight: 600;
  color: var(--text); cursor: pointer; user-select: none;
  transition: all .15s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.food-chip:active { transform: scale(.95); background: #eee; }
.food-chip.selected { font-weight: 700; border-width: 2px; }
.food-chip.selected::before { content: '✓ '; font-size: 10px; }

.food-chip.meat-chip.selected   { background: rgba(96,165,250,.10);  border-color: var(--pull); color: var(--pull); }
.food-chip.soy-chip.selected    { background: rgba(167,139,250,.10); border-color: var(--recovery); color: var(--recovery); }
.food-chip.veg-chip.selected    { background: rgba(74,222,128,.10);  border-color: var(--cardio); color: #166534; }
.food-chip.staple-chip.selected { background: rgba(245,158,11,.10);  border-color: var(--warn); color: #92400e; }

.meal-result { padding: 0 14px 10px; }
.meal-result-empty {
  font-size: 11px; color: var(--sub); text-align: center; padding: 10px 0;
}

.result-item {
  display: flex; align-items: center; gap: 5px; padding: 5px 0;
  border-bottom: 1px dashed rgba(0,0,0,.05); font-size: 12px;
}
.result-item:last-child { border-bottom: none; }
.result-icon { width: 22px; font-size: 16px; text-align: center; flex-shrink: 0; }
.result-name { flex: 1; font-weight: 700; color: var(--text); min-width: 60px; }
.result-portion { font-size: 11px; color: var(--sub); white-space: nowrap; }
.result-pro { font-size: 10px; color: var(--pull); font-weight: 600; white-space: nowrap; }
.result-carb { font-size: 10px; color: var(--warn); font-weight: 600; white-space: nowrap; }
.result-note { font-size: 10px; color: var(--sub); padding-left: 27px; margin-bottom: 1px; }

.result-total {
  margin-top: 6px; padding-top: 6px; border-top: 1.5px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
}
.result-total-label { font-size: 12px; font-weight: 800; color: var(--text); }
.result-total-stat { font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: 700; }
.rt-cal  { background: rgba(224,112,64,.12); color: var(--primary); }
.rt-pro  { background: rgba(96,165,250,.12); color: var(--pull); }
.rt-carb { background: rgba(245,158,11,.12); color: #92400e; }
.rt-fat  { background: rgba(74,222,128,.12); color: #166534; }
.oil-note { font-size: 10px; color: var(--sub); margin-top: 2px; }

.daily-summary-panel {
  background: #fff; border: 2px solid var(--pull); border-radius: 12px;
  padding: 14px; margin: 0 10px 8px;
}
.ds-title { font-size: 15px; font-weight: 800; color: var(--pull); margin-bottom: 10px; text-align: center; }
.ds-meal-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed var(--border); font-size: 12px; }
.ds-meal-row:last-of-type { border-bottom: none; }
.ds-meal-name { font-weight: 700; color: var(--text); }
.ds-meal-kcal { font-size: 11px; color: var(--sub); }
.ds-total-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 2px solid var(--pull); font-weight: 800; font-size: 13px; }
.ds-stat { font-size: 11px; padding: 3px 9px; border-radius: 5px; font-weight: 700; }
.ds-ok { color: var(--cardio); font-size: 12px; font-weight: 800; }
.ds-warn { color: var(--warn); font-size: 12px; font-weight: 800; }
.ds-empty { text-align: center; font-size: 12px; color: var(--sub); padding: 8px; }

.footer { padding: 12px 0 8px; text-align: center; font-size: 11px; color: var(--sub); }

@media(max-width:360px) {
  body { font-size: 13px; }
  .food-chip { padding: 4px 9px; font-size: 11px; }
  .goal-val { font-size: 15px; }
}
</style>
</head>

<h1>今日饮食搭配</h1>
<div class="subtitle">全天目标：<b style="color:var(--primary)">1800 kcal</b> · 蛋白质 <b style="color:var(--pull)">&#8805;100g</b> · 碳水 <b style="color:var(--warn)">100-150g</b> · 脂肪 <b style="color:var(--cardio)">45-60g</b></div>

<div class="goal-card">
  <div class="goal-row">
    <div class="goal-item"><div class="goal-val" style="color:var(--primary)">1800</div><div class="goal-label">热量 kcal</div></div>
    <div class="goal-item"><div class="goal-val" style="color:var(--pull)">100g</div><div class="goal-label">蛋白质</div></div>
    <div class="goal-item"><div class="goal-val" style="color:var(--warn)">150g</div><div class="goal-label">碳水上限</div></div>

<script>
(function() {
  'use strict';

  var FOODS = {
    '鸡蛋':         { cat:'meat', cal:144,pro:13,  carb:1.5, fat:9,   portion:100, unit:'g&#8776;2个', tip:'全蛋营养', meals:['breakfast'] },
    '牛奶':         { cat:'meat', cal:54, pro:3,   carb:3.4, fat:3.2, portion:250, unit:'ml',         tip:'补钙·全脂', meals:['breakfast'] },
    '鸡胸肉':       { cat:'meat', cal:133,pro:30,  carb:0,   fat:1.5, portion:150, unit:'g生重',       tip:'高蛋白低脂', meals:['lunch','dinner'] },
    '鸡腿肉(去皮)': { cat:'meat', cal:150,pro:20,  carb:0,   fat:7,   portion:170, unit:'g生重',       tip:'比鸡胸嫩',   meals:['lunch','dinner'] },
    '瘦猪肉':       { cat:'meat', cal:143,pro:20,  carb:1,   fat:7,   portion:180, unit:'g生重',       tip:'里脊/后腿',  meals:['lunch','dinner'] },
    '瘦牛肉':       { cat:'meat', cal:125,pro:22,  carb:0,   fat:4,   portion:180, unit:'g生重',       tip:'补铁最佳',   meals:['lunch','dinner'] },
    '虾仁':         { cat:'meat', cal:99, pro:20,  carb:0,   fat:1,   portion:180, unit:'g生重',       tip:'几乎零脂肪', meals:['lunch','dinner'] },
    '草鱼块':       { cat:'meat', cal:113,pro:18,  carb:0,   fat:4.5, portion:180, unit:'g',           tip:'清蒸最佳',   meals:['lunch','dinner'] },
    '无糖豆浆':     { cat:'soy',  cal:31, pro:3,   carb:1.2, fat:1.6, portion:250, unit:'ml',         tip:'无糖·低热量',meals:['breakfast'] },
    '嫩豆腐':       { cat:'soy',  cal:62, pro:6.5, carb:2,   fat:3.5, portion:200, unit:'g',           tip:'做汤/凉拌',   meals:['lunch','dinner'] },
    '老豆腐':       { cat:'soy',  cal:81, pro:8.1, carb:2.8, fat:3.7, portion:180, unit:'g',           tip:'炒/煎不散',   meals:['lunch','dinner'] },
    '豆干':         { cat:'soy',  cal:142,pro:16.2,carb:2.8, fat:7,   portion:100, unit:'g',           tip:'蛋白密度高',  meals:['lunch','dinner'] },
    '千张':         { cat:'soy',  cal:260,pro:24.5,carb:5.5, fat:16,  portion:70,  unit:'g',           tip:'热量偏高',    meals:['lunch','dinner'] },
    '番茄':     { cat:'veg',cal:20, pro:0.9,carb:4,  fat:0.2,portion:200,unit:'g', tip:'炒蛋/煮汤',     meals:['breakfast','lunch','dinner'] },
    '丝瓜':     { cat:'veg',cal:20, pro:1,  carb:3,  fat:0.2,portion:250,unit:'g', tip:'当季·清炒',     meals:['lunch','dinner'] },
    '空心菜':   { cat:'veg',cal:23, pro:2.2,carb:2.2,fat:0.3,portion:250,unit:'g', tip:'株洲天天有',    meals:['lunch','dinner'] },
    '苋菜':     { cat:'veg',cal:25, pro:2.8,carb:3,  fat:0.3,portion:250,unit:'g', tip:'红苋菜·补铁',   meals:['lunch','dinner'] },
    '茄子':     { cat:'veg',cal:25, pro:1.1,carb:4.9,fat:0.2,portion:250,unit:'g', tip:'少油蒸拌',      meals:['lunch','dinner'] },
    '豆角':     { cat:'veg',cal:34, pro:2.5,carb:6,  fat:0.3,portion:200,unit:'g', tip:'务必炒熟',      meals:['lunch','dinner'] },
    '黄瓜':     { cat:'veg',cal:16, pro:0.8,carb:2.9,fat:0.2,portion:250,unit:'g', tip:'生吃凉拌',      meals:['lunch','dinner'] },
    '辣椒':     { cat:'veg',cal:22, pro:1,  carb:4,  fat:0.3,portion:150,unit:'g', tip:'提味不占胃',    meals:['lunch','dinner'] },
    '冬瓜':     { cat:'veg',cal:12, pro:0.4,carb:2.6,fat:0.1,portion:300,unit:'g', tip:'热量最低',      meals:['lunch','dinner'] },
    '韭菜':     { cat:'veg',cal:26, pro:2.4,carb:3.2,fat:0.4,portion:150,unit:'g', tip:'炒蛋经典',      meals:['lunch','dinner'] },
    '蘑菇类':   { cat:'veg',cal:25, pro:2.5,carb:2,  fat:0.3,portion:200,unit:'g', tip:'热量极低',      meals:['lunch','dinner'] },
    '玉米':       { cat:'staple',cal:112,pro:4,   carb:22.8,fat:1.2,portion:200,unit:'g&#8776;1根', tip:'优质粗粮', meals:['breakfast','lunch','dinner'] },
    '红薯':       { cat:'staple',cal:102,pro:1.6, carb:23.1,fat:0.2,portion:200,unit:'g生重', tip:'慢碳水',     meals:['breakfast','lunch','dinner'] },
    '全麦面包':   { cat:'staple',cal:265,pro:10.5,carb:47,  fat:4,  portion:80, unit:'g&#8776;2~3片',tip:'膳食纤维', meals:['breakfast'] },
    '南瓜':       { cat:'staple',cal:26, pro:1,   carb:6,   fat:0.1,portion:300,unit:'g',     tip:'碳水偏低',   meals:['breakfast','lunch','dinner'] },
    '杂粮饭':     { cat:'staple',cal:140,pro:3.5, carb:28,  fat:0.8,portion:150,unit:'g熟重', tip:'大米小米糙米', meals:['lunch','dinner'] },
    '米饭':       { cat:'staple',cal:116,pro:2.6, carb:25.9,fat:0.3,portion:150,unit:'g熟重', tip:'优先杂粮饭', meals:['lunch','dinner'] },
    '土豆':       { cat:'staple',cal:81, pro:2,   carb:17.5,fat:0.2,portion:250,unit:'g',     tip:'蒸煮最好',   meals:['lunch','dinner'] },
  };

  var CAT_ICONS = { meat:'&#129385;', soy:'&#129656;', veg:'&#129388;', staple:'&#127834;' };
  var MEALS = ['breakfast','lunch','dinner'];
  var MEAL_LABELS = { breakfast:'早餐', lunch:'午餐', dinner:'晚餐' };
  var MEAL_TARGETS = {
    breakfast: { cal: '400-450', pro: '25-30g', carb: '50-60g', border: '#f59e0b', bg: 'rgba(245,158,11,.06)' },
    lunch:     { cal: '600-650', pro: '35-40g', carb: '60-70g', border: '#4ade80', bg: 'rgba(74,222,128,.06)' },
    dinner:    { cal: '500-550', pro: '30-35g', carb: '40-50g', border: '#a78bfa', bg: 'rgba(167,139,250,.06)' }
  };
  var CAT_ORDER = ['meat','soy','veg','staple'];
  var CAT_LABELS = { meat:'&#129385; 蛋白质（选1样）', soy:'&#129656; 豆制品（可选）', veg:'&#129388; 蔬菜（可选1-2样）', staple:'&#127834; 主食（选1样）' };

  var selections = {};
  MEALS.forEach(function(m) { selections[m] = { meat:null, soy:null, veg:[], staple:null }; });
  selections.breakfast.meat = '鸡蛋';
  selections.breakfast.staple = '玉米';
  selections.breakfast.soy = '无糖豆浆';
  selections.lunch.meat = '鸡胸肉';
  selections.lunch.staple = '杂粮饭';
  selections.lunch.veg = ['丝瓜'];
  selections.dinner.meat = '鸡胸肉';
  selections.dinner.staple = '杂粮饭';
  selections.dinner.veg = ['空心菜'];
  selections.dinner.soy = '嫩豆腐';

  function foodOk(name, meal) {
    var f = FOODS[name];
    return f && f.meals && f.meals.indexOf(meal) >= 0;
  }

  function getChipId(meal, cat) { return 'chip_' + meal + '_' + cat; }

  function calcPortion(food, meal) {
    var f = FOODS[food];
    if (f.cat === 'meat') {
      if (food === '鸡蛋') return { g:100, note:'2个蛋&#8776;26g蛋白' };
      if (food === '牛奶') return { g:250, note:'全脂牛奶&#8776;135kcal' };
      var raw = Math.round(35/f.pro*100/5)*5;
      if (raw>250) raw=250; if (raw<100) raw=100;
      return { g:raw };
    }
    if (f.cat === 'soy') {
      if (food === '无糖豆浆') return { g:250, note:'无糖·低热量' };
      if (food === '千张') return { g:70, note:'热量偏高·配蔬菜' };
      if (food === '豆干') return { g:100 };
      return { g:f.portion };
    }
    if (f.cat === 'veg') return { g:f.portion };
    if (f.cat === 'staple') {
      if (food === '南瓜') return { g:300, note:'碳水低·搭其他主食' };
      var ct = meal==='breakfast'?45:50;
      var raw = Math.round(ct/f.carb*100/5)*5;
      if (raw>300) raw=300; if (raw<30) raw=30;
      return { g:raw };
    }
    return { g:150 };
  }

  function calcMacros(food, grams) {
    var f = FOODS[food], r = grams/100;
    return { cal:Math.round(f.cal*r), pro:Number((f.pro*r).toFixed(1)), carb:Number((f.carb*r).toFixed(1)), fat:Number((f.fat*r).toFixed(1)) };
  }

  function renderMealPanel(meal) {
    var wrapper = document.getElementById('dailyWrapper');
    var panel = document.createElement('div');
    panel.className = 'meal-panel meal-' + meal;
    panel.id = 'panel_' + meal;

    var t = MEAL_TARGETS[meal];
    var headHTML = '<div class="meal-head"><span>&#127748; ' + MEAL_LABELS[meal] + '</span><span style="font-size:12px">~' + t.cal + ' kcal</span></div>';
    headHTML += '<div class="meal-target-row">蛋白质 ' + t.pro + ' · 碳水 ' + t.carb + '</div>';
    headHTML += '<div class="meal-chips">';

    for (var ci = 0; ci < CAT_ORDER.length; ci++) {
      var cat = CAT_ORDER[ci];
      headHTML += '<div class="food-section"><h3>' + CAT_LABELS[cat] + '</h3><div class="food-chips" id="' + getChipId(meal,cat) + '"></div></div>';
    }
    headHTML += '</div>';
    headHTML += '<div class="meal-result" id="result_' + meal + '"></div>';

    panel.innerHTML = headHTML;
    wrapper.appendChild(panel);

    for (var ci = 0; ci < CAT_ORDER.length; ci++) {
      var cat = CAT_ORDER[ci];
      var container = document.getElementById(getChipId(meal, cat));
      var foodKeys = Object.keys(FOODS);
      for (var fi = 0; fi < foodKeys.length; fi++) {
        var name = foodKeys[fi];
        var f = FOODS[name];
        if (f.cat !== cat) continue;
        if (!foodOk(name, meal)) continue;

        var chip = document.createElement('button');
        chip.className = 'food-chip ' + cat + '-chip';
        chip.textContent = name;
        chip.setAttribute('data-food', name);
        chip.setAttribute('data-cat', cat);
        chip.setAttribute('data-meal', meal);

        (function(n, m, c) {
          chip.addEventListener('click', function(e) { e.preventDefault(); handleChipClick(this, n, m, c); });
          chip.addEventListener('touchend', function(e) { e.preventDefault(); handleChipClick(this, n, m, c); });
        })(name, meal, cat);

        container.appendChild(chip);
      }
    }

    refreshMealChips(meal);
    updateMealResult(meal);
  }

  function handleChipClick(chipEl, name, meal, cat) {
    var sel = selections[meal];

    if (cat === 'meat' || cat === 'soy' || cat === 'staple') {
      var allInGroup = document.getElementById(getChipId(meal, cat)).querySelectorAll('.food-chip');
      for (var i=0;i<allInGroup.length;i++) allInGroup[i].classList.remove('selected');
      if (sel[cat]===name) { sel[cat]=null; }
      else { sel[cat]=name; chipEl.classList.add('selected'); }
    } else {
      var idx = sel.veg.indexOf(name);
      if (idx>=0) { sel.veg.splice(idx,1); chipEl.classList.remove('selected'); }
      else {
        if (sel.veg.length>=2) {
          var removed = sel.veg.shift();
          var allVeg = document.getElementById(getChipId(meal,'veg')).querySelectorAll('.food-chip');
          for (var j=0;j<allVeg.length;j++) {
            if (allVeg[j].getAttribute('data-food')===removed) { allVeg[j].classList.remove('selected'); break; }
          }
        }
        sel.veg.push(name); chipEl.classList.add('selected');
      }
    }
    updateMealResult(meal);
    updateDailySummary();
  }

  function refreshMealChips(meal) {
    var sel = selections[meal];
    for (var ci=0;ci<CAT_ORDER.length;ci++) {
      var cat=CAT_ORDER[ci];
      var chips=document.getElementById(getChipId(meal,cat)).querySelectorAll('.food-chip');
      for (var i=0;i<chips.length;i++) chips[i].classList.remove('selected');
    }
    if (sel.meat)  highlightChip(getChipId(meal,'meat'), sel.meat);
    if (sel.soy)   highlightChip(getChipId(meal,'soy'), sel.soy);
    for (var v=0;v<sel.veg.length;v++) highlightChip(getChipId(meal,'veg'), sel.veg[v]);
    if (sel.staple) highlightChip(getChipId(meal,'staple'), sel.staple);
  }

  function highlightChip(containerId, name) {
    var chips = document.getElementById(containerId).querySelectorAll('.food-chip');
    for (var i=0;i<chips.length;i++) {
      if (chips[i].getAttribute('data-food')===name) { chips[i].classList.add('selected'); return; }
    }
  }

  function updateMealResult(meal) {
    var sel = selections[meal];
    var div = document.getElementById('result_' + meal);
    if (!div) return;

    if (!sel.meat || !sel.staple) {
      var msg = !sel.meat&&!sel.staple?'选蛋白质+主食即可看搭配' : !sel.meat?'再选一样蛋白质' : '再选一样主食';
      div.innerHTML = '<div class="meal-result-empty">'+msg+'</div>';
      return;
    }

    var allFoods = [{ name:sel.meat, cat:'meat' }];
    if (sel.soy) allFoods.push({ name:sel.soy, cat:'soy' });
    for (var v=0;v<sel.veg.length;v++) allFoods.push({ name:sel.veg[v], cat:'veg' });
    allFoods.push({ name:sel.staple, cat:'staple' });

    var mc=0,mp=0,mcb=0,mf=0, rows=[];
    for (var a=0;a<allFoods.length;a++) {
      var item=allFoods[a], portion=calcPortion(item.name,meal), m=calcMacros(item.name,portion.g), f=FOODS[item.name];
      rows.push(
        '<div class="result-item">'+
        '<span class="result-icon">'+CAT_ICONS[f.cat]+'</span>'+
        '<span class="result-name">'+item.name+'</span>'+
        '<span class="result-portion">'+portion.g+f.unit+'</span>'+
        '<span class="result-pro">蛋白 '+m.pro+'g</span>'+
        '<span class="result-carb">碳水 '+m.carb+'g</span>'+
        '</div>'
      );
      if (portion.note) rows.push('<div class="result-note">'+portion.note+'</div>');
      mc+=m.cal; mp+=m.pro; mcb+=m.carb; mf+=m.fat;
    }

    var oilHTML = '';
    if (meal!=='breakfast') { mc+=45; mf+=5; oilHTML='<div class="oil-note">烹饪油 ~5g（一茶匙）</div>'; }

    div.innerHTML =
      rows.join('') + oilHTML +
      '<div class="result-total">'+
      '<span class="result-total-label">本餐合计</span>'+
      '<span class="result-total-stat rt-cal">'+mc+' kcal</span>'+
      '<span class="result-total-stat rt-pro">蛋白 '+mp.toFixed(1)+'g</span>'+
      '<span class="result-total-stat rt-carb">碳水 '+mcb.toFixed(1)+'g</span>'+
      '<span class="result-total-stat rt-fat">脂肪 '+mf.toFixed(1)+'g</span>'+
      '</div>';
  }

  function updateDailySummary() {
    var ds = document.getElementById('dsDailyContent');
    var allSet = true;
    for (var i=0;i<MEALS.length;i++) {
      if (!selections[MEALS[i]].meat||!selections[MEALS[i]].staple) { allSet=false; break; }
    }
    if (!allSet) { ds.innerHTML='<div class="ds-empty">在三餐中各选蛋白质 + 主食即可看到汇总</div>'; return; }

    var dc=0,dp=0,dcb=0,df=0;
    var rows=[];

    for (var m=0;m<MEALS.length;m++) {
      var meal=MEALS[m], sel=selections[meal];
      var allFoods=[{name:sel.meat,cat:'meat'}];
      if(sel.soy)allFoods.push({name:sel.soy,cat:'soy'});
      for(var v=0;v<sel.veg.length;v++)allFoods.push({name:sel.veg[v],cat:'veg'});
      allFoods.push({name:sel.staple,cat:'staple'});

      var mc=0, items=[];
      for(var a=0;a<allFoods.length;a++) {
        var item=allFoods[a], portion=calcPortion(item.name,meal), mx=calcMacros(item.name,portion.g), f=FOODS[item.name];
        items.push('<b>'+item.name+'</b> '+portion.g+f.unit);
        mc+=mx.cal; dp+=mx.pro; dcb+=mx.carb; df+=mx.fat;
      }
      if(meal!=='breakfast'){mc+=45;df+=5;}
      dc+=mc;
      rows.push('<div class="ds-meal-row"><span class="ds-meal-name">'+MEAL_LABELS[meal]+'</span><span style="font-size:11px;color:var(--sub)">'+items.join(' &middot; ')+'</span><span class="ds-meal-kcal">'+mc+' kcal</span></div>');
    }

    var proOk=dp>=98, calOk=dc>=1700&&dc<=2000;
    ds.innerHTML =
      rows.join('')+
      '<div class="ds-total-row">'+
      '<span>全天合计</span>'+
      '<span class="ds-stat rt-cal">'+dc+' kcal</span>'+
      '<span class="ds-stat rt-pro">蛋白 '+dp.toFixed(1)+'g</span>'+
      '<span class="ds-stat rt-carb">碳水 '+dcb.toFixed(1)+'g</span>'+
      '<span class="ds-stat rt-fat">脂肪 '+df.toFixed(1)+'g</span>'+
      '</div>'+
      '<div style="margin-top:6px;font-size:12px">'+
      (proOk?'<span class="ds-ok">蛋白达标(&#8805;98g)</span> ':'<span class="ds-warn">蛋白不足(&lt;98g)</span> ')+
      (calOk?'<span class="ds-ok">热量在目标范围(1700-2000)</span>':'<span class="ds-warn">热量偏离目标范围</span>')+
      '</div>';
  }

  for (var mi=0;mi<MEALS.length;mi++) renderMealPanel(MEALS[mi]);
  updateDailySummary();

})();
</script>

</body>
</html>
