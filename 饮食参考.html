<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#faf8f5">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="shared.css">
<title>饮食搭配 · 减脂计划</title>
<style>
:root {
  --primary: #e07040; --pull: #60a5fa; --push: #f59e0b;
  --warn: #f59e0b; --cardio: #4ade80; --recovery: #a78bfa;
  --danger: #ef4444; --text: #1e1e1e; --sub: #888;
  --surface: #faf8f5; --border: #e5e0d8;
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 0 0 80px; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background: var(--surface); color: var(--text); line-height: 1.65; font-size: 14px;
  -webkit-tap-highlight-color: transparent;
}

h1 { font-size: 20px; text-align: center; padding: 12px 0 0; color: var(--primary); margin: 0; }
.subtitle { text-align: center; font-size: 11px; color: var(--sub); margin: 2px 0 10px; line-height: 1.6; }

.goal-card { margin: 0 10px 10px; padding: 10px 12px; background: #fff; border: 1px solid var(--border); border-radius: 10px; }
.goal-row { display: flex; justify-content: space-around; text-align: center; }
.goal-item { flex: 1; }
.goal-val { font-size: 17px; font-weight: 800; }
.goal-label { font-size: 10px; color: var(--sub); margin-top: 1px; }

/* 星期按钮 */
.weekday-bar { display: flex; gap: 4px; margin: 0 10px 8px; justify-content: center; flex-wrap: wrap; padding: 0 4px; }
.weekday-btn {
  flex: 1; min-width: 40px; max-width: 50px; padding: 8px 0;
  border: 1.5px solid var(--border); border-radius: 10px;
  background: #fff; font-size: 11px; font-weight: 700; color: var(--text);
  cursor: pointer; text-align: center; transition: all .15s; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.weekday-btn.active { background: var(--pull); color: #fff; border-color: var(--pull); font-weight: 800; }
.weekday-btn.today { border-color: var(--primary); }
.weekday-btn.today.active { border-color: var(--pull); }
.weekday-btn:active { transform: scale(.94); }

/* 餐次面板 */
.daily-wrapper { margin: 0 10px 12px; }

.meal-panel {
  background: #fff; border-radius: 12px; margin-bottom: 11px;
  border-left: 4px solid #ccc; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.meal-panel.meal-breakfast { border-left-color: #f59e0b; }
.meal-panel.meal-lunch     { border-left-color: #4ade80; }
.meal-panel.meal-dinner    { border-left-color: #a78bfa; }

.meal-head {
  padding: 11px 14px 5px; font-size: 15px; font-weight: 800;
  display: flex; justify-content: space-between; align-items: baseline;
}
.meal-breakfast .meal-head { color: #92400e; }
.meal-lunch .meal-head     { color: #166534; }
.meal-dinner .meal-head    { color: #6d28d9; }

.meal-target-row {
  padding: 0 14px 6px; font-size: 11px; color: var(--sub);
}

.meal-chips { padding: 0 10px 6px; }

.food-section { margin-bottom: 6px; }
.food-section h3 {
  font-size: 11px; color: var(--sub); margin: 0 0 4px 4px; font-weight: 600;
}
.food-chips { display: flex; flex-wrap: wrap; gap: 5px; }

.food-chip {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 5px 11px; border-radius: 16px; border: 1.5px solid var(--border);
  background: var(--surface); font-size: 12px; font-weight: 600;
  color: var(--text); cursor: pointer; user-select: none;
  transition: all .15s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.food-chip:active { transform: scale(.95); background: #eee; }
.food-chip.selected { font-weight: 700; border-width: 2px; }
.food-chip.selected::before { content: '✓ '; font-size: 10px; }

.food-chip.meat-chip.selected   { background: rgba(96,165,250,.10);  border-color: var(--pull); color: var(--pull); }
.food-chip.soy-chip.selected    { background: rgba(167,139,250,.10); border-color: var(--recovery); color: var(--recovery); }
.food-chip.veg-chip.selected    { background: rgba(74,222,128,.10);  border-color: var(--cardio); color: #166534; }
.food-chip.staple-chip.selected { background: rgba(245,158,11,.10);  border-color: var(--warn); color: #92400e; }

.meal-result { padding: 0 14px 10px; }
.meal-result-empty {
  font-size: 11px; color: var(--sub); text-align: center; padding: 10px 0;
}

.result-item {
  display: flex; align-items: center; gap: 5px; padding: 5px 0;
  border-bottom: 1px dashed rgba(0,0,0,.05); font-size: 12px;
}
.result-item:last-child { border-bottom: none; }
.result-icon { width: 22px; font-size: 16px; text-align: center; flex-shrink: 0; }
.result-name { flex: 1; font-weight: 700; color: var(--text); min-width: 60px; }
.result-portion { font-size: 11px; color: var(--sub); white-space: nowrap; }
.result-pro { font-size: 10px; color: var(--pull); font-weight: 600; white-space: nowrap; }
.result-carb { font-size: 10px; color: var(--warn); font-weight: 600; white-space: nowrap; }
.result-note { font-size: 10px; color: var(--sub); padding-left: 27px; margin-bottom: 1px; }

.result-total {
  margin-top: 6px; padding-top: 6px; border-top: 1.5px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
}
.result-total-label { font-size: 12px; font-weight: 800; color: var(--text); }
.result-total-stat { font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: 700; }
.rt-cal  { background: rgba(224,112,64,.12); color: var(--primary); }
.rt-pro  { background: rgba(96,165,250,.12); color: var(--pull); }
.rt-carb { background: rgba(245,158,11,.12); color: #92400e; }
.rt-fat  { background: rgba(74,222,128,.12); color: #166534; }
.oil-note { font-size: 10px; color: var(--sub); margin-top: 2px; }

/* 全天汇总 */
.daily-summary-panel {
  background: #fff; border: 2px solid var(--pull); border-radius: 12px;
  padding: 14px; margin: 0 10px 8px;
}
.ds-title { font-size: 15px; font-weight: 800; color: var(--pull); margin-bottom: 10px; text-align: center; }
.ds-meal-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed var(--border); font-size: 12px; }
.ds-meal-row:last-of-type { border-bottom: none; }
.ds-meal-name { font-weight: 700; color: var(--text); }
.ds-meal-kcal { font-size: 11px; color: var(--sub); }
.ds-total-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 2px solid var(--pull); font-weight: 800; font-size: 13px; }
.ds-stat { font-size: 11px; padding: 3px 9px; border-radius: 5px; font-weight: 700; }
.ds-ok { color: var(--cardio); font-size: 12px; font-weight: 800; }
.ds-warn { color: var(--warn); font-size: 12px; font-weight: 800; }
.ds-empty { text-align: center; font-size: 12px; color: var(--sub); padding: 8px; }

/* 保存状态栏 */
.save-status-bar {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  margin: 10px 10px 2px; padding: 8px 12px;
  background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px;
  font-size: 12px; font-weight: 600; color: #166534;
  transition: all .3s;
}
.save-status-bar.unsaved {
  background: #fffbeb; border-color: #fde68a; color: #92400e;
  animation: pulse-save 1.2s ease-in-out;
}
@keyframes pulse-save {
  0%,100% { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
  50% { background: #fffbeb; border-color: #fde68a; color: #92400e; }
}
.save-status-icon { font-size: 15px; line-height: 1; }
.save-status-time { font-size: 10px; color: #6b7280; margin-left: 4px; }
.actions-row { text-align: center; margin: 2px 0 6px; }
.save-btn {
  padding: 8px 32px; background: #e5e7eb; color: #6b7280; border: 1px solid #d1d5db;
  border-radius: 10px; font-size: 13px; font-weight: 600; cursor: default;
  transition: all .15s; user-select: none;
}

/* 采购清单 */
.shopping-list { margin: 0 10px 16px; background: #fff; border: 2px solid var(--cardio); border-radius: 12px; padding: 14px; }
.shopping-title { font-size: 16px; font-weight: 800; color: #166534; margin: 0 0 10px; text-align: center; }
.shop-cat-title { font-size: 13px; font-weight: 800; margin: 12px 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.shop-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px dashed rgba(0,0,0,.05); font-size: 12px; }
.shop-name { font-weight: 700; flex: 1; min-width: 60px; }
.shop-detail { font-size: 11px; color: var(--sub); white-space: nowrap; margin: 0 8px; }
.shop-total { font-weight: 700; font-size: 12px; color: var(--primary); text-align: right; min-width: 55px; }
.shop-empty { text-align: center; font-size: 12px; color: var(--sub); padding: 12px; }

.footer { padding: 12px 0 8px; text-align: center; font-size: 11px; color: var(--sub); }

@media(max-width:360px) {
  body { font-size: 13px; }
  .food-chip { padding: 4px 9px; font-size: 11px; }
  .goal-val { font-size: 15px; }
}
</style>
</head>

    '嫩豆腐':       { cat:'soy',  cal:62, pro:6.5, carb:2,   fat:3.5, portion:200, unit:'g',           tip:'做汤/凉拌',   meals:['lunch','dinner'] },
    '老豆腐':       { cat:'soy',  cal:81, pro:8.1, carb:2.8, fat:3.7, portion:180, unit:'g',           tip:'炒/煎不散',   meals:['lunch','dinner'] },
    '豆干':         { cat:'soy',  cal:142,pro:16.2,carb:2.8, fat:7,   portion:100, unit:'g',           tip:'蛋白密度高',  meals:['lunch','dinner'] },

    '番茄':     { cat:'veg',cal:20, pro:0.9,carb:4,  fat:0.2,portion:200,unit:'g', tip:'炒蛋/煮汤',     meals:['lunch','dinner'] },
    '丝瓜':     { cat:'veg',cal:20, pro:1,  carb:3,  fat:0.2,portion:250,unit:'g', tip:'当季·清炒',     meals:['lunch','dinner'] },
    '空心菜':   { cat:'veg',cal:23, pro:2.2,carb:2.2,fat:0.3,portion:250,unit:'g', tip:'株洲天天有',    meals:['lunch','dinner'] },
    '苋菜':     { cat:'veg',cal:25, pro:2.8,carb:3,  fat:0.3,portion:250,unit:'g', tip:'红苋菜·补铁',   meals:['lunch','dinner'] },
    '茄子':     { cat:'veg',cal:25, pro:1.1,carb:4.9,fat:0.2,portion:250,unit:'g', tip:'少油蒸拌',      meals:['lunch','dinner'] },

    '冬瓜':     { cat:'veg',cal:12, pro:0.4,carb:2.6,fat:0.1,portion:300,unit:'g', tip:'热量最低',      meals:['lunch','dinner'] },
    '韭菜':     { cat:'veg',cal:26, pro:2.4,carb:3.2,fat:0.4,portion:150,unit:'g', tip:'炒蛋经典',      meals:['lunch','dinner'] },
    '蘑菇类':   { cat:'veg',cal:25, pro:2.5,carb:2,  fat:0.3,portion:200,unit:'g', tip:'热量极低',      meals:['lunch','dinner'] },
    '玉米':       { cat:'staple',cal:112,pro:4,   carb:22.8,fat:1.2,portion:200,unit:'g&#8776;1根', tip:'优质粗粮', meals:['breakfast','lunch','dinner'] },
    '红薯':       { cat:'staple',cal:102,pro:1.6, carb:23.1,fat:0.2,portion:200,unit:'g生重', tip:'慢碳水',     meals:['lunch','dinner'] },
    '全麦面包':   { cat:'staple',cal:265,pro:10.5,carb:47,  fat:4,  portion:80, unit:'g&#8776;2~3片',tip:'膳食纤维', meals:['breakfast'] },
    '南瓜':       { cat:'staple',cal:26, pro:1,   carb:6,   fat:0.1,portion:300,unit:'g',     tip:'碳水偏低',   meals:['lunch','dinner'] },
    '杂粮饭':     { cat:'staple',cal:140,pro:3.5, carb:28,  fat:0.8,portion:150,unit:'g熟重', tip:'大米小米糙米', meals:['lunch','dinner'] },

    '土豆':       { cat:'staple',cal:81, pro:2,   carb:17.5,fat:0.2,portion:250,unit:'g',     tip:'蒸煮最好',   meals:['lunch','dinner'] },

  var CAT_ICONS = { meat:'&#129385;', soy:'&#129656;', veg:'&#129388;', staple:'&#127834;' };

  var MEAL_LABELS = { breakfast:'早餐', lunch:'午餐', dinner:'晚餐' };

  function stapleRequired(meal) { return meal !== 'breakfast'; }

  // ========== 全局状态 ==========
  var DAY_IDS = ['mon','tue','wed','thu','fri','sat','sun'];
  var DAY_ZH  = ['周一','周二','周三','周四','周五','周六','周日'];
  var todayIdx = new Date().getDay(); // 0=Sun
  var todayId = DAY_IDS[todayIdx===0?6:todayIdx-1];
  var currentDay = todayId;
  var weeklySel = {};

  // ========== 计算 ==========
  function foodOk(name, meal) {
    var f = FOODS[name];
    return f && f.meals && f.meals.indexOf(meal) >= 0;
  }

  function calcPortion(food, meal) {
    var f = FOODS[food];
    if (f.cat === 'meat') {
      if (food === '鸡蛋') return { g:100, note:'2个蛋≈26g蛋白' };
      if (food === '牛奶') return { g:250, note:'全脂牛奶≈135kcal' };
      if (food === '无糖酸奶') return { g:200, note:'200ml≈126kcal' };
      // 午餐肉 ≈250kcal，晚餐肉 ≈200kcal
      var calTarget = (meal === 'lunch') ? 250 : 200;
      var raw = Math.round(calTarget / f.cal * 100 / 5) * 5;
      if (raw > 250) raw = 250; if (raw < 100) raw = 100;
      return { g:raw };
    }
    if (f.cat === 'soy') {
      if (food === '无糖豆浆') return { g:250, note:'无糖·低热量' };
      if (food === '千张') return { g:70, note:'热量偏高·配蔬菜' };
      if (food === '豆干') return { g:100 };
      return { g:f.portion };
    }
    if (f.cat === 'veg') return { g:f.portion };
    if (f.cat === 'staple') {
      if (food === '燕麦片') return { g:50, note:'50g干重≈一碗粥' };
      if (food === '全麦面包') return { g:80, note:'≈2~3片' };

      // 午餐主食 ≈280kcal，晚餐主食 ≈230kcal
      var calTarget = (meal === 'lunch') ? 280 : 230;
      var raw = Math.round(calTarget / f.cal * 100 / 5) * 5;
      if (raw > 350) raw = 350; if (raw < 50) raw = 50;
      return { g:raw };
    }
    return { g:150 };
  }

  function calcMacros(food, grams) {
    var f = FOODS[food], r = grams/100;
    return { cal:Math.round(f.cal*r), pro:Number((f.pro*r).toFixed(1)), carb:Number((f.carb*r).toFixed(1)), fat:Number((f.fat*r).toFixed(1)) };
  }

  // ========== 初始化 ==========
  function init() {
    // 读存储
    var saved = localStorage.getItem('jf_weekly_plan_v3');
    if (saved) { try { weeklySel = JSON.parse(saved); } catch(e) {} }

    // 确保数据结构完整
    DAY_IDS.forEach(function(d) {
      if (!weeklySel[d]) weeklySel[d] = {};
      MEALS.forEach(function(m) {
        if (!weeklySel[d][m]) weeklySel[d][m] = {meat:null,soy:null,veg:[],staple:null};
        if (m==='breakfast') {
          if (typeof weeklySel[d][m].meat === 'string') weeklySel[d][m].meat = [weeklySel[d][m].meat];
          if (!Array.isArray(weeklySel[d][m].meat)) weeklySel[d][m].meat = [];
        }
      });
    });

    // 给空白天预填默认模板
    DAY_IDS.forEach(function(d) {
      var bf = weeklySel[d].breakfast;
      if (!bf.meat || bf.meat.length===0) bf.meat = ['鸡蛋','牛奶'];
      if (!bf.staple) bf.staple = '燕麦片';

      var lu = weeklySel[d].lunch;
      if (!lu.meat) lu.meat = '鸡胸肉';
      if (!lu.staple) lu.staple = '杂粮饭';
      if (!lu.veg || lu.veg.length===0) lu.veg = ['丝瓜'];

      var di = weeklySel[d].dinner;
      if (!di.meat) di.meat = '鸡胸肉';
      if (!di.staple) di.staple = '杂粮饭';
      if (!di.veg || di.veg.length===0) di.veg = ['空心菜'];
      if (!di.soy) di.soy = '嫩豆腐';
    });

    // 建星期按钮
    var bar = document.getElementById('weekdayBar');
    DAY_IDS.forEach(function(d,i) {
      var btn = document.createElement('button');
      btn.className = 'weekday-btn';
      if (d===todayId) btn.classList.add('today');
      btn.textContent = DAY_ZH[i];
      btn.setAttribute('data-day', d);
      btn.addEventListener('click', function() { switchDay(d); });
      bar.appendChild(btn);
    });

    switchDay(todayId);
    renderShopList();

    // 初始化时如果已有存储数据，显示上次保存状态
    if (saved) { updateSaveStatus(); }
  }

  // ========== 切换天 ==========
  function switchDay(day) {
    currentDay = day;
    var btns = document.querySelectorAll('.weekday-btn');
    for (var i=0;i<btns.length;i++) {
      btns[i].classList.toggle('active', btns[i].getAttribute('data-day')===day);
    }
    renderDayMeals();
    renderDaySummary();
  }

  // ========== 渲染当天三餐面板 ==========
  function renderDayMeals() {
    var wrap = document.getElementById('dayMealsWrapper');
    wrap.innerHTML = '';

    MEALS.forEach(function(meal) {
      var t = MEAL_TARGETS[meal];
      var panel = document.createElement('div');
      panel.className = 'meal-panel meal-'+meal;
      panel.id = 'panel_'+meal;

      var h = '<div class="meal-head"><span>'+MEAL_LABELS[meal]+'</span><span style="font-size:12px;font-weight:600">~'+t.cal+' kcal</span></div>';
      h += '<div class="meal-target-row">蛋白质 '+t.pro+' · 碳水 '+t.carb+'</div>';
      h += '<div class="meal-chips">';

      for (var ci=0;ci<CAT_ORDER.length;ci++) {
        var cat=CAT_ORDER[ci];
        var label;
        if (cat==='staple' && !stapleRequired(meal)) label = '&#127834; 主食（可不选）';
        else if (cat==='meat' && meal==='breakfast') label = '&#129385; 蛋白质（可选1-2样）';
        else label = CAT_LABELS[cat];
        h += '<div class="food-section"><h3>'+label+'</h3><div class="food-chips" id="chip_'+meal+'_'+cat+'"></div></div>';
      }
      h += '</div><div class="meal-result" id="result_'+meal+'"></div>';
      panel.innerHTML = h;
      wrap.appendChild(panel);

      // 填食物chips
      for (var ci=0;ci<CAT_ORDER.length;ci++) {
        var cat=CAT_ORDER[ci];
        var container = document.getElementById('chip_'+meal+'_'+cat);
        Object.keys(FOODS).forEach(function(name) {
          var f=FOODS[name];
          if (f.cat!==cat || !foodOk(name,meal)) return;
          var chip = document.createElement('button');
          chip.className = 'food-chip '+cat+'-chip';
          chip.textContent = name;
          chip.setAttribute('data-food', name);
          (function(n,m,c) {
            chip.addEventListener('click', function(e){ e.preventDefault(); onChipClick(n,m,c); });
            chip.addEventListener('touchend', function(e){ e.preventDefault(); onChipClick(n,m,c); });
          })(name, meal, cat);
          container.appendChild(chip);
        });
      }

      refreshChips(meal);
      renderMealResult(meal);
    });
  }

  // ========== 点击食材 ==========
  function onChipClick(name, meal, cat) {
    var sel = weeklySel[currentDay][meal];

    if (cat==='meat' && meal==='breakfast') {
      var idx = sel.meat.indexOf(name);
      if (idx>=0) { sel.meat.splice(idx,1); }
      else {
        if (sel.meat.length>=2) sel.meat.shift();
        sel.meat.push(name);
      }
    } else if (cat==='meat'||cat==='soy'||cat==='staple') {
      var chips = document.getElementById('chip_'+meal+'_'+cat).querySelectorAll('.food-chip');
      for (var i=0;i<chips.length;i++) chips[i].classList.remove('selected');
      sel[cat] = (sel[cat]===name) ? null : name;
    } else {
      var idx = sel.veg.indexOf(name);
      if (idx>=0) { sel.veg.splice(idx,1); }
      else {
        if (sel.veg.length>=2) sel.veg.shift();
        sel.veg.push(name);
      }
    }

    refreshChips(meal);
    renderMealResult(meal);
    renderDaySummary();
    doAutoSave(); // 自动保存
  }

  function refreshChips(meal) {
    var sel = weeklySel[currentDay][meal];
    for (var ci=0;ci<CAT_ORDER.length;ci++) {
      var cat=CAT_ORDER[ci];
      var container=document.getElementById('chip_'+meal+'_'+cat);
      if (!container) return;
      var chips=container.querySelectorAll('.food-chip');
      for (var i=0;i<chips.length;i++) chips[i].classList.remove('selected');
    }
    if (meal==='breakfast' && Array.isArray(sel.meat)) {
      for (var bm=0;bm<sel.meat.length;bm++) markChip(meal,'meat',sel.meat[bm]);
    } else if (sel.meat) {
      markChip(meal,'meat',sel.meat);
    }
    if (sel.soy) markChip(meal,'soy',sel.soy);
    for (var v=0;v<sel.veg.length;v++) markChip(meal,'veg',sel.veg[v]);
    if (sel.staple) markChip(meal,'staple',sel.staple);
  }

  function markChip(meal, cat, name) {
    var chips = document.getElementById('chip_'+meal+'_'+cat).querySelectorAll('.food-chip');
    for (var i=0;i<chips.length;i++) {
      if (chips[i].getAttribute('data-food')===name) { chips[i].classList.add('selected'); return; }
    }
  }

  // ========== 单餐结果 ==========
  function renderMealResult(meal) {
    var sel = weeklySel[currentDay][meal];
    var div = document.getElementById('result_'+meal);
    if (!div) return;

    var hasMeat = (meal==='breakfast' && Array.isArray(sel.meat)) ? (sel.meat.length>0) : !!sel.meat;
    if (!hasMeat || (stapleRequired(meal) && !sel.staple)) {
      div.innerHTML = '<div class="meal-result-empty">选蛋白质'+(stapleRequired(meal)?'+主食':'')+'即可看搭配</div>';
      return;
    }

    var foods;
    if (meal==='breakfast' && Array.isArray(sel.meat)) {
      foods = sel.meat.map(function(mn){ return {name:mn,cat:'meat'}; });
    } else {
      foods = [{name:sel.meat,cat:'meat'}];
    }
    if (sel.soy) foods.push({name:sel.soy,cat:'soy'});
    for (var v=0;v<sel.veg.length;v++) foods.push({name:sel.veg[v],cat:'veg'});
    if (sel.staple) foods.push({name:sel.staple,cat:'staple'});

    var mc=0,mp=0,mcb=0,mf=0,rows=[];
    for (var a=0;a<foods.length;a++) {
      var item=foods[a], p=calcPortion(item.name,meal), m=calcMacros(item.name,p.g), f=FOODS[item.name];
      rows.push(
        '<div class="result-item">'+
        '<span class="result-icon">'+CAT_ICONS[f.cat]+'</span>'+
        '<span class="result-name">'+item.name+'</span>'+
        '<span class="result-portion">'+p.g+f.unit+'</span>'+
        '<span class="result-pro">蛋白 '+m.pro+'g</span>'+
        '<span class="result-carb">碳水 '+m.carb+'g</span>'+
        '</div>'
      );
      if (p.note) rows.push('<div class="result-note">'+p.note+'</div>');
      mc+=m.cal; mp+=m.pro; mcb+=m.carb; mf+=m.fat;
    }

    var oilHTML='';
    if (meal!=='breakfast') { mc+=45; mf+=5; oilHTML='<div class="oil-note">烹饪油 ~5g（一茶匙）</div>'; }

    div.innerHTML = rows.join('')+oilHTML+
      '<div class="result-total">'+
      '<span class="result-total-label">本餐合计</span>'+
      '<span class="result-total-stat rt-cal">'+mc+' kcal</span>'+
      '<span class="result-total-stat rt-pro">蛋白 '+mp.toFixed(1)+'g</span>'+
      '<span class="result-total-stat rt-carb">碳水 '+mcb.toFixed(1)+'g</span>'+
      '<span class="result-total-stat rt-fat">脂肪 '+mf.toFixed(1)+'g</span>'+
      '</div>';
  }

  // ========== 当天汇总 ==========
  function renderDaySummary() {
    var ds = document.getElementById('dsContent');
    var sel = weeklySel[currentDay];
    var allSet = true;
    for (var i=0;i<MEALS.length;i++) {
      var m=MEALS[i], s=sel[m];
      var hm = (m==='breakfast'&&Array.isArray(s.meat))?(s.meat.length>0):!!s.meat;
      if (!hm||(stapleRequired(m)&&!s.staple)){allSet=false;break;}
    }
    if (!allSet){ ds.innerHTML='<div class="ds-empty">三餐各选蛋白质（早餐可不选主食）即可看到汇总</div>'; return; }

    var dc=0,dp=0,dcb=0,df=0,rows=[];
    for (var m=0;m<MEALS.length;m++) {
      var meal=MEALS[m], s=sel[meal];
      var foods;
      if (meal==='breakfast'&&Array.isArray(s.meat)) {
        foods=s.meat.map(function(mn){return{name:mn,cat:'meat'};});
      } else {
        foods=[{name:s.meat,cat:'meat'}];
      }
      if(s.soy)foods.push({name:s.soy,cat:'soy'});
      for(var v=0;v<s.veg.length;v++)foods.push({name:s.veg[v],cat:'veg'});
      if(s.staple)foods.push({name:s.staple,cat:'staple'});

      var mc=0,items=[];
      for(var a=0;a<foods.length;a++){
        var item=foods[a],p=calcPortion(item.name,meal),mx=calcMacros(item.name,p.g);
        items.push('<b>'+item.name+'</b> '+p.g+FOODS[item.name].unit);
        mc+=mx.cal;dp+=mx.pro;dcb+=mx.carb;df+=mx.fat;
      }
      if(meal!=='breakfast'){mc+=45;df+=5;}
      dc+=mc;
      rows.push('<div class="ds-meal-row"><span class="ds-meal-name">'+MEAL_LABELS[meal]+'</span><span style="font-size:11px;color:var(--sub)">'+items.join(' &middot; ')+'</span><span class="ds-meal-kcal">'+mc+' kcal</span></div>');
    }

    var proOk=dp>=98, calOk=dc>=1700&&dc<=2000;
    ds.innerHTML = rows.join('')+
      '<div class="ds-total-row"><span>全天合计</span>'+
      '<span class="ds-stat rt-cal">'+dc+' kcal</span>'+
      '<span class="ds-stat rt-pro">蛋白 '+dp.toFixed(1)+'g</span>'+
      '<span class="ds-stat rt-carb">碳水 '+dcb.toFixed(1)+'g</span>'+
      '<span class="ds-stat rt-fat">脂肪 '+df.toFixed(1)+'g</span></div>'+
      '<div style="margin-top:6px;font-size:12px">'+
      (proOk?'<span class="ds-ok">蛋白达标(&#8805;98g)</span> ':'<span class="ds-warn">蛋白不足(&lt;98g)</span> ')+
      (calOk?'<span class="ds-ok">热量在目标范围(1700-2000)</span>':'<span class="ds-warn">热量偏离目标范围</span>')+'</div>';
  }

  // ========== 自动保存（每次选食材后自动触发） ==========
  var autoSaveTimer = null;
  function doAutoSave() {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(function() {
      localStorage.setItem('jf_weekly_plan_v3', JSON.stringify(weeklySel));
      renderShopList();
      updateSaveStatus();
    }, 400); // 400ms 防抖：连续快速点击只存一次
  }

  function updateSaveStatus() {
    var bar = document.getElementById('saveStatus');
    var txt = document.getElementById('saveStatusText');
    var time = document.getElementById('saveStatusTime');
    if (!bar || !txt) return;

    var now = new Date();
    var h = now.getHours().toString().padStart(2,'0');
    var m = now.getMinutes().toString().padStart(2,'0');
    var s = now.getSeconds().toString().padStart(2,'0');
    time.textContent = h+':'+m+':'+s;

    bar.classList.remove('unsaved');
    setTimeout(function() {
      bar.classList.add('unsaved');
    }, 20);
    setTimeout(function() {
      bar.classList.remove('unsaved');
    }, 1500);
  }

  // ========== 保存（保留手动触发入口） ==========
  window.saveWeek = function() {
    localStorage.setItem('jf_weekly_plan_v3', JSON.stringify(weeklySel));
    renderShopList();
    updateSaveStatus();
  };

  // ========== 采购清单单位转换 ==========
  function formatShopTotal(name, totalGrams, mealCount) {
    var perMeal = Math.round(totalGrams / mealCount);
    // 鸡蛋 → 个数（1个≈50g）
    if (name === '鸡蛋') {
      var totalEggs = Math.ceil(totalGrams / 50);
      var perMealEggs = Math.round(totalGrams / mealCount / 50);
      return { detail: perMealEggs + '个 × ' + mealCount + '餐', total: totalEggs + '个' };
    }
    // 液体 → ml
    if (name === '牛奶' || name === '无糖酸奶' || name === '无糖豆浆') {
      return { detail: perMeal + 'ml × ' + mealCount + '餐', total: Math.round(totalGrams) + 'ml' };
    }
    // 米饭/杂粮饭 → 干重（熟重÷2.5）
    if (name === '米饭' || name === '杂粮饭') {
      var dryPerMeal = Math.round(perMeal / 2.5);
      var dryTotal = Math.round(totalGrams / 2.5);
      return { detail: dryPerMeal + 'g(干) × ' + mealCount + '餐', total: dryTotal + 'g（干重）' };
    }
    // 其他 → g
    return { detail: perMeal + 'g × ' + mealCount + '餐', total: Math.round(totalGrams) + 'g' };
  }

  // ========== 采购清单 ==========
  function renderShopList() {
    var content = document.getElementById('shoppingContent');
    var totals = {};
    var hasData = false;

    DAY_IDS.forEach(function(day) {
      var sel = weeklySel[day];
      if (!sel) return;
      MEALS.forEach(function(meal) {
        var msel = sel[meal];
        var hasMeatS = (meal==='breakfast' && Array.isArray(msel.meat)) ? (msel.meat.length>0) : !!msel.meat;
        if (!msel || !hasMeatS) return;
        hasData = true;

        var items;
        if (meal==='breakfast' && Array.isArray(msel.meat)) {
          items = msel.meat.map(function(mn){ return {name:mn,cat:'meat',ml:meal}; });
        } else {
          items = [{name:msel.meat,cat:'meat',ml:meal}];
        }
        if (msel.soy) items.push({name:msel.soy,cat:'soy',ml:meal});
        msel.veg.forEach(function(v){ items.push({name:v,cat:'veg',ml:meal}); });
        if (msel.staple) items.push({name:msel.staple,cat:'staple',ml:meal});

        items.forEach(function(item) {
          var p = calcPortion(item.name, item.ml);
          if (!totals[item.name]) totals[item.name] = {cat:item.cat, grams:0, meals:0};
          totals[item.name].grams += p.g;
          totals[item.name].meals += 1;
        });
      });
    });

    if (!hasData) {
      content.innerHTML = '<div class="shop-empty">设定每天饮食后保存，这里会显示本周需要采购的食材总量</div>';
      return;
    }

    var catOrder = ['meat','soy','veg','staple'];
    var catNames = {meat:'\uD83E\uDD69 蛋白质类',soy:'\uD83E\uDED8 豆制品',veg:'\uD83E\uDD6C 蔬菜类',staple:'\uD83C\uDF5A 主食类'};
    var catColors = {meat:'var(--pull)',soy:'var(--recovery)',veg:'var(--cardio)',staple:'var(--warn)'};

    var html = '';
    catOrder.forEach(function(cat) {
      var catItems = [];
      Object.keys(totals).forEach(function(name) {
        if (totals[name].cat === cat) catItems.push({name:name, d:totals[name]});
      });
      if (catItems.length === 0) return;

      html += '<div class="shop-cat-title" style="color:'+catColors[cat]+'">'+catNames[cat]+'</div>';
      catItems.forEach(function(item) {
        var fmt = formatShopTotal(item.name, item.d.grams, item.d.meals);
        html += '<div class="shop-row">'+
          '<span class="shop-name">'+item.name+'</span>'+
          '<span class="shop-detail">'+fmt.detail+'</span>'+
          '<span class="shop-total"><b>'+fmt.total+'</b></span>'+
          '</div>';
      });
    });

    content.innerHTML = html;
  }

  init();

})();
</script>

</body>
</html>
