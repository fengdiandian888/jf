<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#faf8f5">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="shared.css">
<title>饮食搭配 · 减脂计划</title>
<style>
:root { --primary: #e07040; --pull: #60a5fa; --push: #f59e0b; --cardio: #4ade80; --recovery: #a78bfa; --danger: #ef4444; --text: #1e1e1e; --sub: #888; --surface: #faf8f5; --border: #e5e0d8; }
* { box-sizing: border-box; }
body { margin: 0; padding: 0 0 80px; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; background: var(--surface); color: var(--text); line-height: 1.6; font-size: 14px; -webkit-tap-highlight-color: transparent; }
h1 { font-size: 19px; text-align: center; padding: 14px 0 2px; color: var(--primary); margin: 0; }

/* 目标栏 — 紧凑一行 */
.goal-bar { display: flex; justify-content: space-around; margin: 6px 10px 10px; padding: 8px 10px; background: #fff; border: 1px solid var(--border); border-radius: 10px; }
.goal-item { text-align: center; }
.goal-val { font-size: 16px; font-weight: 800; }
.goal-label { font-size: 9px; color: var(--sub); margin-top: 1px; }

/* 设置卡片 */
.setup-card { margin: 0 10px 10px; padding: 12px; background: #fff; border: 2px solid var(--primary); border-radius: 12px; }
.setup-title { font-size: 15px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }

/* 搜索 */
.search-wrap { position: relative; margin-bottom: 6px; }
.search-input { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; background: var(--surface); color: var(--text); }
.search-input:focus { border-color: var(--primary); }
.search-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 2px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; max-height: 220px; overflow-y: auto; z-index: 10; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
.search-dropdown.show { display: block; }
.search-item { padding: 10px 12px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,.04); display: flex; align-items: center; gap: 6px; transition: background .1s; }
.search-item:last-child { border-bottom: none; }
.search-item:active, .search-item:hover { background: rgba(224,112,64,.06); }
.search-item .si-cat { font-size: 10px; color: var(--sub); margin-left: auto; }
.search-empty { padding: 14px; text-align: center; color: var(--sub); font-size: 12px; }

/* 已选标签 */
.selected-tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 10px; margin-bottom: 10px; }
.selected-tags:empty::after { content: '点击搜索栏添加食材'; color: var(--sub); font-size: 12px; padding: 4px 0; }
.tag { display: inline-flex; align-items: center; gap: 3px; padding: 4px 6px 4px 10px; background: rgba(224,112,64,.06); border: 1.5px solid var(--primary); border-radius: 18px; font-size: 12px; font-weight: 700; animation: tagIn .2s ease; }
@keyframes tagIn { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.tag-qty { width: 48px; padding: 2px 0; border: none; border-bottom: 1.5px solid var(--primary); text-align: center; font-weight: 800; font-size: 13px; background: transparent; color: var(--text); font-family: inherit; outline: none; }
.tag-unit { font-size: 10px; color: var(--sub); font-weight: 600; }
.tag-remove { width: 22px; height: 22px; border-radius: 50%; background: var(--danger); color: #fff; border: none; font-size: 16px; line-height: 22px; cursor: pointer; padding: 0; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.tag-remove:active { transform: scale(.9); }

/* 分配按钮 — 始终可用 */
.assign-btn { display: block; width: 100%; padding: 11px; background: linear-gradient(135deg, var(--primary) 0%, #f08050 100%); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; transition: all .15s; letter-spacing: 1px; }
.assign-btn:active { transform: scale(.97); }
.assign-hint { font-size: 10px; color: var(--sub); text-align: center; margin-top: 4px; }

/* 周安排卡片 */
.plan-card { margin: 0 10px 16px; background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: none; }
.plan-card.show { display: block; }
.plan-header { padding: 10px 14px; font-size: 15px; font-weight: 800; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.plan-regen { font-size: 11px; color: var(--primary); font-weight: 700; background: none; border: 1.5px solid var(--primary); padding: 3px 10px; border-radius: 8px; cursor: pointer; }
.plan-row { padding: 6px 12px; display: flex; gap: 8px; font-size: 11px; border-bottom: 1px solid rgba(0,0,0,.03); align-items: flex-start; }
.plan-day { font-weight: 800; color: var(--sub); min-width: 28px; padding-top: 1px; }
.plan-meals { flex: 1; }
.plan-line { margin-bottom: 2px; line-height: 1.4; }
.plan-mtag { font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px; margin-right: 3px; }
.mtag-lunch { background: rgba(74,222,128,.15); color: #166534; }
.mtag-dinner { background: rgba(167,139,250,.15); color: #6d28d9; }
.plan-pro { color: var(--pull); font-weight: 700; }
.plan-soy { color: var(--recovery); font-weight: 700; }
.plan-staple { color: var(--warn); }

/* 结余 — 紧凑内嵌 */
.plan-surplus { padding: 8px 12px; border-top: 1px dashed var(--border); background: rgba(0,0,0,.01); }
.surplus-title { font-size: 11px; font-weight: 800; color: var(--sub); margin-bottom: 4px; }
.surplus-row { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; font-size: 11px; }
.surplus-name { font-weight: 700; min-width: 56px; }
.surplus-num { font-weight: 600; color: var(--sub); font-size: 10px; }
.surplus-left { font-weight: 800; min-width: 52px; text-align: right; font-size: 10px; }
.surplus-left.ok { color: var(--cardio); }
.surplus-left.warn { color: var(--warn); }
.surplus-left.zero { color: var(--danger); }
.surplus-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.surplus-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
.surplus-bar-fill.ok { background: var(--cardio); }
.surplus-bar-fill.warn { background: var(--warn); }
.surplus-bar-fill.zero { background: var(--danger); }
.plan-empty { padding: 20px; text-align: center; color: var(--sub); font-size: 13px; }
</style>
<script src="data.js"></script>
</head>
<body>
<nav class="top-nav">
  <a href="今日计划.html">今日</a>
  <a href="减脂训练日跟练.html">锻炼</a>
  <a href="饮食参考.html" class="active">饮食</a>
</nav>


<h1>一周饮食设置</h1>

<div class="goal-bar">
  <div class="goal-item"><div class="goal-val" style="color:var(--primary)">1800</div><div class="goal-label">热量 kcal</div></div>
  <div class="goal-item"><div class="goal-val" style="color:var(--pull)">100g</div><div class="goal-label">蛋白质</div></div>
  <div class="goal-item"><div class="goal-val" style="color:var(--warn)">150g</div><div class="goal-label">碳水上限</div></div>
  <div class="goal-item"><div class="goal-val" style="color:var(--cardio)">60g</div><div class="goal-label">脂肪上限</div></div>
</div>

<div class="setup-card">
  <div class="setup-title">📦 本周买了什么？</div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="🔍 搜索食材…" autocomplete="off">
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
  <div class="selected-tags" id="selectedTags"></div>
  <button class="assign-btn" id="assignBtn">🔄 自动分配一周</button>
  <div class="assign-hint" id="assignHint">添加至少1样蛋白质、蔬菜、主食</div>
</div>

<div class="plan-card" id="planCard">
  <div class="plan-header">
    <span>📅 本周安排</span>
    <button class="plan-regen" id="regenBtn">🔄 重新分配</button>
  </div>
  <div id="planGrid"></div>
  <div class="plan-surplus" id="planSurplus" style="display:none"></div>
</div>

<script>
(function() {
  'use strict';

  var FOODS = window.FOODS;
  var CAT_ICONS = { meat:'🥩', soy:'🫘', veg:'🥬', staple:'🍚' };
  var CAT_LABEL = { meat:'蛋白质', soy:'豆制品', veg:'蔬菜', staple:'主食' };
  var CAT_ORDER = ['meat','veg','staple','soy'];
  var DAY_IDS = ['mon','tue','wed','thu','fri','sat','sun'];
  var DAY_ZH  = ['周一','周二','周三','周四','周五','周六','周日'];

  var weeklySel = {};
  var ingredientStock = {};
  var shuffleSeed = 0;

  // ========== 工具 ==========
  function getDisplayUnit(name) {
    if (name === '鸡蛋') return '个';
    if (['牛奶','无糖酸奶','无糖豆浆'].indexOf(name) >= 0) return 'ml';
    return 'g';
  }
  function toDisplayQty(name, sv) {
    if (!sv) return '';
    return name === '鸡蛋' ? Math.round(sv/50) : sv;
  }
  function toStorageQty(name, dv) {
    var v = parseInt(dv) || 0;
    return name === '鸡蛋' ? v*50 : v;
  }
  function defaultBought(name) {
    if (name === '鸡蛋') return 100;   // 2个
    if (name === '牛奶') return 250;
    if (['无糖酸奶','无糖豆浆'].indexOf(name) >= 0) return 250;
    if (FOODS[name] && FOODS[name].cat === 'veg') return 200;
    if (FOODS[name] && FOODS[name].cat === 'staple') return 150;
    return 200;
  }

  // calcPortion 已收口到 data.js（window.calcPortion）

  // ========== 搜索 ==========
  function getAssignableFoods() {
    var arr = [];
    Object.keys(FOODS).forEach(function(name) {
      var f = FOODS[name];
      if (!f.meals) return;
      var hasLD = f.meals.indexOf('lunch')>=0 || f.meals.indexOf('dinner')>=0;
      if (!hasLD) return;
      arr.push({ name:name, cat:f.cat });
    });
    return arr;
  }

  var assignableFoods = getAssignableFoods();

  function renderSearchDropdown(query) {
    var dd = document.getElementById('searchDropdown');
    var q = (query||'').toLowerCase().trim();
    if (!q) { dd.classList.remove('show'); dd.innerHTML = ''; return; }

    var filtered = assignableFoods.filter(function(f) {
      return f.name.toLowerCase().indexOf(q) >= 0;
    });

    if (filtered.length === 0) {
      dd.innerHTML = '<div class="search-empty">没找到「'+query+'」，换个关键词试试</div>';
      dd.classList.add('show');
      return;
    }

    // 按分类分组
    var groups = {};
    filtered.forEach(function(f) {
      if (!groups[f.cat]) groups[f.cat] = [];
      groups[f.cat].push(f);
    });

    var html = '';
    CAT_ORDER.forEach(function(cat) {
      if (!groups[cat]) return;
      groups[cat].forEach(function(f) {
        var alreadyAdded = ingredientStock[f.name] && ingredientStock[f.name].bought > 0;
        html += '<div class="search-item" data-food="'+f.name+'"'+(alreadyAdded?' style="opacity:.5"':'')+'>';
        html += CAT_ICONS[cat]+' '+f.name;
        html += '<span class="si-cat">'+CAT_LABEL[cat]+'</span>';
        html += '</div>';
      });
    });

    dd.innerHTML = html;
    dd.classList.add('show');

    // 绑定点击
    dd.querySelectorAll('.search-item').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var name = el.getAttribute('data-food');
        addFood(name);
        document.getElementById('searchInput').value = '';
        dd.classList.remove('show');
        dd.innerHTML = '';
      });
    });
  }

  // ========== 已选标签 ==========
  function addFood(name) {
    if (!ingredientStock[name]) ingredientStock[name] = { bought: 0, used: 0 };
    ingredientStock[name].bought = defaultBought(name);
    ingredientStock[name].used = 0;
    renderTags();
    save();
  }

  function removeFood(name) {
    delete ingredientStock[name];
    renderTags();
    save();
  }

  function updateFoodQty(name, val) {
    var sv = toStorageQty(name, val);
    if (sv > 0) {
      if (!ingredientStock[name]) ingredientStock[name] = { bought: 0, used: 0 };
      ingredientStock[name].bought = sv;
    } else {
      delete ingredientStock[name];
    }
    saveDebounced();
  }

  var saveTimer;
  function saveDebounced() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 400);
  }
  function save() {
    localStorage.setItem('jf_ingredient_stock', JSON.stringify(ingredientStock));
    updateHint();
    if (weeklySel && Object.keys(weeklySel).length > 0) {
      renderPlan();
    }
  }

  function renderTags() {
    var wrap = document.getElementById('selectedTags');
    var html = '';

    Object.keys(ingredientStock).forEach(function(name) {
      var stock = ingredientStock[name];
      if (!stock || stock.bought <= 0) return;
      var f = FOODS[name];
      var cat = f ? f.cat : 'veg';
      var u = getDisplayUnit(name);
      var dv = toDisplayQty(name, stock.bought);

      html += '<span class="tag">';
      html += CAT_ICONS[cat] + ' ' + name + ' ';
      html += '<input class="tag-qty" type="number" value="'+dv+'" min="0" step="'+ (name==='鸡蛋'?1:50) +'" data-food="'+name+'" data-unit="'+u+'">';
      html += '<span class="tag-unit">'+u+'</span>';
      html += '<button class="tag-remove" data-food="'+name+'">&times;</button>';
      html += '</span>';
    });

    wrap.innerHTML = html;
    updateHint();

    // 事件
    wrap.querySelectorAll('.tag-qty').forEach(function(input) {
      input.addEventListener('input', function() {
        updateFoodQty(input.getAttribute('data-food'), input.value);
      });
    });
    wrap.querySelectorAll('.tag-remove').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        removeFood(btn.getAttribute('data-food'));
      });
    });
  }

  function updateHint() {
    var has = { meat: false, veg: false, staple: false };
    Object.keys(ingredientStock).forEach(function(name) {
      var f = FOODS[name];
      if (!f || ingredientStock[name].bought <= 0) return;
      if (has[f.cat] !== undefined) has[f.cat] = true;
    });

    var hint = document.getElementById('assignHint');
    var missing = [];
    if (!has.meat) missing.push('蛋白质');
    if (!has.veg) missing.push('蔬菜');
    if (!has.staple) missing.push('主食');

    if (missing.length === 0) {
      hint.textContent = '已覆盖全部类别，可自动分配';
      hint.style.color = 'var(--cardio)';
    } else {
      hint.textContent = '还需添加：「' + missing.join('」「') + '」';
      hint.style.color = 'var(--warn)';
    }
  }

  // ========== 自动分配 ==========
  function autoAssign() {
    var meats=[], veggies=[], staples=[], soys=[];
    Object.keys(ingredientStock).forEach(function(name) {
      var f = FOODS[name];
      if (!f || ingredientStock[name].bought <= 0) return;
      if (f.cat === 'meat') meats.push(name);
      if (f.cat === 'veg') veggies.push(name);
      if (f.cat === 'staple') staples.push(name);
      if (f.cat === 'soy') soys.push(name);
    });

    // 固定标准三餐模式：不依赖库存，直接生成（库存为空也能生成）

    // 重置 used
    Object.keys(ingredientStock).forEach(function(n) {
      ingredientStock[n].used = 0;
    });

    var off = shuffleSeed;
    weeklySel = {};

    DAY_IDS.forEach(function(dayId, d) {
      var luMeat = meats[(d*2+off) % meats.length];
      var diMeat = meats[(d*2+1+off) % meats.length];

      var vi = (d*4+off) % veggies.length;
      var luVeg1 = veggies[vi];
      var luVeg2 = veggies[(vi+1) % veggies.length];
      var luVegs = luVeg1===luVeg2 ? [luVeg1] : [luVeg1, luVeg2];

      vi = (d*4+2+off) % veggies.length;
      var diVeg1 = veggies[vi];
      var diVeg2 = veggies[(vi+1) % veggies.length];
      var diVegs = diVeg1===diVeg2 ? [diVeg1] : [diVeg1, diVeg2];

      var luStaple = staples[(d+off) % staples.length];
      var diStaple = staples[(d+1+off) % staples.length];

      var diSoy = null;
      if (soys.length>0 && (d+off)%2===0) diSoy = soys[(d+off)%soys.length];

      weeklySel[dayId] = {
        breakfast: {meat:['鸡蛋','牛奶'], soy:null, veg:[], staple:'燕麦片'},
        lunch:     {meat:'鸡胸肉', soy:null, veg:['黄瓜'], staple:'杂粮饭'},
        dinner:    {meat:'鸡胸肉', soy:null, veg:['黄瓜'], staple:'杂粮饭'}
      };

      addUsage('鸡胸肉', 'lunch');
      addUsage('鸡胸肉', 'dinner');
      addUsage('黄瓜', 'lunch');
      addUsage('黄瓜', 'dinner');
      addUsage('杂粮饭', 'lunch');
      addUsage('杂粮饭', 'dinner');
    });

    shuffleSeed++;
    localStorage.setItem('jf_weekly_plan_v3', JSON.stringify(weeklySel));
    localStorage.setItem('jf_ingredient_stock', JSON.stringify(ingredientStock));
    renderPlan();
  }

  function addUsage(name, meal) {
    if (!ingredientStock[name]) return;
    ingredientStock[name].used = (ingredientStock[name].used||0) + calcPortion(name, meal).g;
  }

  // ========== 周安排 + 结余 ==========
  function renderPlan() {
    var card = document.getElementById('planCard');
    var grid = document.getElementById('planGrid');
    var surplus = document.getElementById('planSurplus');

    var hasAny = DAY_IDS.some(function(d) {
      return weeklySel[d] && weeklySel[d].lunch && weeklySel[d].lunch.meat;
    });

    if (!hasAny) { card.classList.remove('show'); return; }
    card.classList.add('show');

    var html = '';
    DAY_IDS.forEach(function(dayId, d) {
      var s = weeklySel[dayId];
      if (!s) return;

      // 午餐
      var luPts = [];
      if (s.lunch && s.lunch.meat) {
        var p = calcPortion(s.lunch.meat, 'lunch');
        var u = FOODS[s.lunch.meat] ? (FOODS[s.lunch.meat].unit||'g') : 'g';
        luPts.push('<span class="plan-pro">'+s.lunch.meat+' '+p.g+u+'</span>');
      }
      if (s.lunch && s.lunch.veg && s.lunch.veg.length>0) {
        s.lunch.veg.forEach(function(v){ var p=calcPortion(v,'lunch'); luPts.push(v+p.g+'g'); });
      }
      if (s.lunch && s.lunch.staple) {
        var sp = calcPortion(s.lunch.staple, 'lunch');
        luPts.push('<span class="plan-staple">'+s.lunch.staple+' '+sp.g+'g</span>');
      }

      // 晚餐
      var diPts = [];
      if (s.dinner && s.dinner.meat) {
        var p2 = calcPortion(s.dinner.meat, 'dinner');
        diPts.push('<span class="plan-pro">'+s.dinner.meat+' '+p2.g+'g</span>');
      }
      if (s.dinner && s.dinner.veg && s.dinner.veg.length>0) {
        s.dinner.veg.forEach(function(v){ var p=calcPortion(v,'dinner'); diPts.push(v+p.g+'g'); });
      }
      if (s.dinner && s.dinner.staple) {
        var sp2 = calcPortion(s.dinner.staple, 'dinner');
        diPts.push('<span class="plan-staple">'+s.dinner.staple+' '+sp2.g+'g</span>');
      }
      if (s.dinner && s.dinner.soy) {
        var syp = calcPortion(s.dinner.soy, 'dinner');
        diPts.push('<span class="plan-soy">+'+s.dinner.soy+' '+syp.g+'g</span>');
      }

      html += '<div class="plan-row">'+
        '<div class="plan-day">'+DAY_ZH[d]+'</div>'+
        '<div class="plan-meals">'+
          '<div class="plan-line"><span class="plan-mtag mtag-lunch">午</span>'+luPts.join(' · ')+'</div>'+
          '<div class="plan-line"><span class="plan-mtag mtag-dinner">晚</span>'+diPts.join(' · ')+'</div>'+
        '</div>'+
      '</div>';
    });

    grid.innerHTML = html;

    // 结余
    renderSurplus(surplus);
  }

  function renderSurplus(el) {
    var items = [];
    Object.keys(ingredientStock).forEach(function(name) {
      var s = ingredientStock[name];
      if (!s || s.bought <= 0) return;
      var used = s.used || 0;
      items.push({ name:name, bought:s.bought, used:used, left:s.bought-used });
    });

    if (items.length === 0) { el.style.display = 'none'; return; }
    el.style.display = 'block';

    // 按分类排
    var catOrder = { meat:1, veg:2, staple:3, soy:4 };
    items.sort(function(a,b) {
      var ca = FOODS[a.name] ? (catOrder[FOODS[a.name].cat]||9) : 9;
      var cb = FOODS[b.name] ? (catOrder[FOODS[b.name].cat]||9) : 9;
      return ca-cb || a.left-b.left;
    });

    var html = '<div class="surplus-title">📊 消耗结余</div>';

    items.forEach(function(item) {
      var f = FOODS[item.name];
      var cat = f ? f.cat : 'veg';
      var u = getDisplayUnit(item.name);
      var pct = Math.round(item.used / item.bought * 100);
      var leftClass = item.left<=0 ? 'zero' : (pct>=80 ? 'warn' : 'ok');
      var leftVal = toDisplayQty(item.name, Math.max(0,item.left));
      var leftText = item.left<=0 ? '用完' : ('剩'+leftVal+u);

      html += '<div class="surplus-row">';
      html += '<span class="surplus-name">'+CAT_ICONS[cat]+' '+item.name+'</span>';
      html += '<span class="surplus-num">买'+toDisplayQty(item.name,item.bought)+u+' · 用'+toDisplayQty(item.name,item.used)+u+'</span>';
      html += '<span class="surplus-left '+leftClass+'">'+leftText+'</span>';
      html += '<div class="surplus-bar-wrap"><div class="surplus-bar-fill '+leftClass+'" style="width:'+Math.min(pct,100)+'%"></div></div>';
      html += '</div>';
    });

    el.innerHTML = html;
  }

  // ========== 初始化 ==========
  function init() {
    // 读存储
    var sp = localStorage.getItem('jf_weekly_plan_v3');
    if (sp) { try { weeklySel = JSON.parse(sp); } catch(e) {} }

    var ss = localStorage.getItem('jf_ingredient_stock');
    if (ss) { try { ingredientStock = JSON.parse(ss); } catch(e) { ingredientStock = {}; } }

    // 有安排但没stock: 反推
    if (weeklySel && Object.keys(weeklySel).length>0 && (!ingredientStock || Object.keys(ingredientStock).length===0)) {
      ingredientStock = {};
      DAY_IDS.forEach(function(dayId) {
        var s = weeklySel[dayId];
        if (!s) return;
        ['lunch','dinner'].forEach(function(meal) {
          var m = s[meal]; if (!m) return;
          var items = [];
          if (m.meat) items.push({name:m.meat, ml:meal});
          if (m.soy) items.push({name:m.soy, ml:meal});
          if (m.veg) m.veg.forEach(function(v){ items.push({name:v, ml:meal}); });
          if (m.staple) items.push({name:m.staple, ml:meal});
          items.forEach(function(item) {
            var p = calcPortion(item.name, item.ml);
            if (!ingredientStock[item.name]) ingredientStock[item.name]={bought:p.g, used:0};
            else ingredientStock[item.name].bought += p.g;
          });
        });
      });
      localStorage.setItem('jf_ingredient_stock', JSON.stringify(ingredientStock));
    }

    renderTags();
    updateHint();

    // 搜索
    var searchInput = document.getElementById('searchInput');
    var searchDropdown = document.getElementById('searchDropdown');

    searchInput.addEventListener('input', function() {
      renderSearchDropdown(searchInput.value);
    });
    searchInput.addEventListener('focus', function() {
      if (searchInput.value.trim()) renderSearchDropdown(searchInput.value);
    });
    // 点其他地方关闭
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.search-wrap')) {
        searchDropdown.classList.remove('show');
        searchInput.value = '';
      }
    });

    // 分配按钮
    document.getElementById('assignBtn').addEventListener('click', function(e) {
      e.preventDefault();
      autoAssign();
    });
    document.getElementById('regenBtn').addEventListener('click', function(e) {
      e.preventDefault();
      autoAssign();
    });

    // 已有计划直接显示
    if (weeklySel && Object.keys(weeklySel).length>0) renderPlan();
  }

  init();
})();
</script>
</body>
</html>
